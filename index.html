<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>TON Market</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#111;
color:white;
padding-bottom:40px;
overflow-x:hidden;
}

:root{
--green:#4caf50;
--orange:#ff9800;
--blue:#2196f3;
--gray:#444;
--card:#1d1d1d;
--card2:#262626;
}

header{
position:sticky;
top:0;
z-index:100;
background:#111;
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.top-row{
display:flex;
justify-content:center;
gap:10px;
position:relative;
}

.top-btn{
border:none;
color:white;
font-weight:700;
cursor:pointer;
transition:.15s;
}

.top-btn:active{
transform:scale(.96);
}

.buy-btn,
.sell-btn{
height:50px;
padding:0 22px;
border-radius:16px;
font-size:16px;
min-width:120px;
}

.buy-btn{
background:var(--green);
}

.sell-btn{
background:var(--orange);
}

.profile-btn{
position:absolute;
right:0;
top:0;
width:42px;
height:42px;
border-radius:12px;
background:black;
font-size:18px;
}

.my-row{
display:flex;
justify-content:center;
margin-top:12px;
}

.my-btn{
background:var(--blue);
height:48px;
padding:0 24px;
border-radius:16px;
font-size:16px;
}

.container{
padding:14px;
max-width:900px;
margin:auto;
}

.hidden{
display:none !important;
}

form{
display:flex;
flex-direction:column;
gap:12px;
background:var(--card);
padding:16px;
border-radius:22px;
}

input,
select,
textarea{
width:100%;
border:none;
background:var(--card2);
color:white;
padding:15px;
font-size:16px;
border-radius:14px;
outline:none;
}

textarea{
resize:none;
height:90px;
}

.submit-btn{
border:none;
background:#00aaff;
color:white;
height:54px;
border-radius:16px;
font-size:17px;
font-weight:700;
}

.tools{
display:flex;
gap:8px;
margin-bottom:12px;
flex-wrap:wrap;
}

.gray-btn{
background:var(--gray);
border:none;
color:white;
height:34px;
padding:0 12px;
border-radius:12px;
font-size:12px;
font-weight:700;
}

.filters{
display:none;
flex-direction:column;
gap:10px;
background:var(--card);
padding:14px;
border-radius:18px;
margin-bottom:14px;
}

.cards{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

@media(min-width:700px){
.cards{
grid-template-columns:repeat(2,1fr);
}
}

.cards.compact img,
.cards.compact .no-image{
display:none;
}

.cards.list{
display:flex;
flex-direction:column;
}

.cards.list img,
.cards.list .no-image{
display:none;
}

.cards.list .card-content{
flex-direction:row;
justify-content:space-between;
align-items:center;
}

.card{
background:var(--card);
border-radius:22px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.no-image{
height:180px;
display:flex;
justify-content:center;
align-items:center;
background:#2a2a2a;
color:#777;
}

.card-content{
padding:14px;
display:flex;
flex-direction:column;
gap:8px;
}

.card-title{
font-size:20px;
font-weight:700;
word-break:break-word;
}

.price{
font-size:24px;
font-weight:700;
color:var(--green);
}

.empty{
text-align:center;
margin-top:60px;
font-size:22px;
opacity:.8;
}

.modal,
.profile-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.82);
display:none;
justify-content:flex-end;
flex-direction:column;
z-index:999;
}

.modal-content,
.profile-box{
background:var(--card);
border-radius:24px 24px 0 0;
padding:18px;
max-height:90vh;
overflow:auto;
}

.modal-content img{
width:100%;
max-height:320px;
object-fit:cover;
border-radius:18px;
}

.modal-body{
display:flex;
flex-direction:column;
gap:12px;
margin-top:14px;
}

.close-btn,
.remove-btn{
height:52px;
border:none;
border-radius:16px;
color:white;
font-size:16px;
font-weight:700;
margin-top:8px;
}

.close-btn{
background:#444;
}

.remove-btn{
background:#ff3b3b;
}

</style>
</head>

<body>

<header>

<div class="top-row">

<button class="top-btn buy-btn"
onclick="showSection('buy')">
Купить
</button>

<button class="top-btn sell-btn"
onclick="showSection('sell')">
Продать
</button>

<button class="top-btn profile-btn"
onclick="openProfile()">
👤
</button>

</div>

<div class="my-row">

<button class="top-btn my-btn"
onclick="showSection('my')">
Мои объявления
</button>

</div>

</header>

<div class="container">

<section id="sellSection" class="hidden">

<form id="sellForm">

<input type="text"
id="title"
placeholder="Название"
required>

<input type="file"
id="image"
accept="image/*">

<select id="generation" required>

<option value="">Поколение</option>

<option value="1 поколение">1 поколение</option>
<option value="2 поколение">2 поколение</option>
<option value="3 поколение">3 поколение</option>
<option value="4 поколение">4 поколение</option>
<option value="5 поколение">5 поколение</option>
<option value="6 поколение">6 поколение</option>
<option value="7 поколение">7 поколение</option>
<option value="8 поколение">8 поколение</option>
<option value="9 поколение">9 поколение</option>
<option value="10 поколение">10 поколение</option>

</select>

<select id="rarity" required>

<option value="">Редкость</option>

<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>

</select>

<select id="biome" required>

<option value="">Биом</option>

<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
<option>Эхо</option>

</select>

<textarea
id="features"
maxlength="150"
placeholder="Описание">
</textarea>

<input
type="number"
id="price"
step="0.01"
min="0.01"
placeholder="Цена TON"
required>

<button
class="submit-btn"
type="submit">
Создать объявление
</button>

</form>

</section>

<section id="buySection">

<div class="tools">

<button
class="gray-btn"
onclick="toggleFilters()">
Фильтры
</button>

<button
class="gray-btn"
id="sortBtn">
Цена ↓
</button>

<button
class="gray-btn"
onclick="changeViewMode()">
Вид
</button>

</div>

<div class="filters" id="filters">

<select id="filterGeneration">

<option value="">Все поколения</option>

<option value="1 поколение">1 поколение</option>
<option value="2 поколение">2 поколение</option>
<option value="3 поколение">3 поколение</option>
<option value="4 поколение">4 поколение</option>
<option value="5 поколение">5 поколение</option>
<option value="6 поколение">6 поколение</option>
<option value="7 поколение">7 поколение</option>
<option value="8 поколение">8 поколение</option>
<option value="9 поколение">9 поколение</option>
<option value="10 поколение">10 поколение</option>

</select>

<select id="filterRarity">

<option value="">Любая редкость</option>

<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>

</select>

<select id="filterBiome">

<option value="">Любой биом</option>

<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
<option>Эхо</option>

</select>

</div>

<div class="cards" id="cards"></div>

<div class="empty hidden" id="emptyText">
Пока нет объявлений
</div>

</section>

<section id="mySection" class="hidden">

<div class="cards" id="myCards"></div>

<div class="empty hidden" id="myEmpty">
У вас нет объявлений
</div>

</section>

</div>

<div class="profile-modal" id="profileModal">

<div class="profile-box">

<h2>Профиль</h2>

<div id="profileName"></div>
<div id="profileUsername"></div>

<button
class="close-btn"
onclick="closeProfile()">
Закрыть
</button>

</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user || {};

const username = user.username || "unknown";

const firstName = user.first_name || "Пользователь";

document.getElementById("profileName").innerText =
"Имя: " + firstName;

document.getElementById("profileUsername").innerText =
"@" + username;

let ads =
JSON.parse(localStorage.getItem("ads")) || [];

let ascending = true;

let currentView = 0;

function saveAds(){

localStorage.setItem(
"ads",
JSON.stringify(ads)
);

}

function showSection(section){

document.getElementById(
"sellSection"
).classList.add("hidden");

document.getElementById(
"buySection"
).classList.add("hidden");

document.getElementById(
"mySection"
).classList.add("hidden");

if(section==="sell"){

document.getElementById(
"sellSection"
).classList.remove("hidden");

}

if(section==="buy"){

document.getElementById(
"buySection"
).classList.remove("hidden");

renderAds();

}

if(section==="my"){

document.getElementById(
"mySection"
).classList.remove("hidden");

renderMyAds();

}

}

function toggleFilters(){

const filters =
document.getElementById("filters");

if(filters.style.display==="flex"){

filters.style.display="none";

}else{

filters.style.display="flex";

}

}

function changeViewMode(){

const cards =
document.getElementById("cards");

currentView++;

if(currentView>2){
currentView=0;
}

cards.classList.remove("compact");
cards.classList.remove("list");

if(currentView===1){

cards.classList.add("compact");

}

if(currentView===2){

cards.classList.add("list");

}

}

function openProfile(){

document.getElementById(
"profileModal"
).style.display="flex";

}

function closeProfile(){

document.getElementById(
"profileModal"
).style.display="none";

}

function getImage(ad){

if(ad.image){

return `<img src="${ad.image}">`;

}

return `
<div class="no-image">
Нет фото
</div>
`;

}

function openAd(ad,my=false){

const modal =
document.createElement("div");

modal.className="modal";

modal.style.display="flex";

modal.innerHTML = `

<div class="modal-content">

${getImage(ad)}

<div class="modal-body">

<div class="card-title">
${ad.title}
</div>

<div>
Поколение:
${ad.generation}
</div>

<div>
Редкость:
${ad.rarity}
</div>

<div>
Биом:
${ad.biome}
</div>

<div>
Описание:
${ad.features || "Нет"}
</div>

<div>
Продавец:
@${ad.owner}
</div>

<div class="price">
${ad.price.toFixed(2)} TON
</div>

${my ? `
<button
class="remove-btn"
onclick="removeAd(${ad.id})">
Снять с продажи
</button>
` : ""}

<button
class="close-btn"
onclick="this.closest('.modal').remove()">
Закрыть
</button>

</div>

</div>

`;

document.body.appendChild(modal);

modal.onclick = e=>{

if(e.target===modal){

modal.remove();

}

};

}

function removeAd(id){

ads = ads.filter(
ad=>ad.id!==id
);

saveAds();

renderAds();

renderMyAds();

document
.querySelectorAll(".modal")
.forEach(m=>m.remove());

}

function renderAds(){

const cards =
document.getElementById("cards");

cards.innerHTML="";

let filtered=[...ads];

const generation =
document.getElementById(
"filterGeneration"
).value;

const rarity =
document.getElementById(
"filterRarity"
).value;

const biome =
document.getElementById(
"filterBiome"
).value;

if(generation){

filtered = filtered.filter(
ad=>ad.generation===generation
);

}

if(rarity){

filtered = filtered.filter(
ad=>ad.rarity===rarity
);

}

if(biome){

filtered = filtered.filter(
ad=>ad.biome===biome
);

}

filtered.sort((a,b)=>

ascending
? a.price-b.price
: b.price-a.price

);

document.getElementById(
"emptyText"
).classList.toggle(
"hidden",
filtered.length!==0
);

filtered.forEach(ad=>{

const card =
document.createElement("div");

card.className="card";

card.innerHTML = `

${getImage(ad)}

<div class="card-content">

<div class="card-title">
${ad.title}
</div>

<div>
${ad.rarity}
</div>

<div>
${ad.biome}
</div>

<div class="price">
${ad.price.toFixed(2)} TON
</div>

</div>

`;

card.addEventListener(
"click",
()=>openAd(ad)
);

cards.appendChild(card);

});

}

function renderMyAds(){

const myCards =
document.getElementById("myCards");

myCards.innerHTML="";

const myAds =
ads.filter(
ad=>ad.owner===username
);

document.getElementById(
"myEmpty"
).classList.toggle(
"hidden",
myAds.length!==0
);

myAds.forEach(ad=>{

const card =
document.createElement("div");

card.className="card";

card.innerHTML = `

${getImage(ad)}

<div class="card-content">

<div class="card-title">
${ad.title}
</div>

<div class="price">
${ad.price.toFixed(2)} TON
</div>

</div>

`;

card.addEventListener(
"click",
()=>openAd(ad,true)
);

myCards.appendChild(card);

});

}

document.getElementById(
"filterGeneration"
).addEventListener(
"change",
renderAds
);

document.getElementById(
"filterRarity"
).addEventListener(
"change",
renderAds
);

document.getElementById(
"filterBiome"
).addEventListener(
"change",
renderAds
);

document.getElementById(
"sortBtn"
).onclick = ()=>{

ascending=!ascending;

document.getElementById(
"sortBtn"
).textContent =
ascending
? "Цена ↓"
: "Цена ↑";

renderAds();

};

document.getElementById(
"sellForm"
).addEventListener(
"submit",
e=>{

e.preventDefault();

const file =
document.getElementById(
"image"
).files[0];

const createAd = (
imageData=null
)=>{

const ad = {

id:Date.now(),

owner:username,

title:
document.getElementById(
"title"
).value,

image:imageData,

generation:
document.getElementById(
"generation"
).value,

rarity:
document.getElementById(
"rarity"
).value,

biome:
document.getElementById(
"biome"
).value,

features:
document.getElementById(
"features"
).value,

price:parseFloat(
document.getElementById(
"price"
).value
)

};

ads.unshift(ad);

saveAds();

renderAds();

renderMyAds();

document.getElementById(
"sellForm"
).reset();

showSection("buy");

};

if(file){

const reader =
new FileReader();

reader.onload = ()=>{

createAd(reader.result);

};

reader.readAsDataURL(file);

}else{

createAd();

}

});

showSection("buy");

</script>

</body>
</html>
