<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gatto Shop</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
min-height:100vh;
overflow-x:hidden;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

header{
padding:18px 16px;
display:flex;
flex-direction:column;
gap:16px;
background:#1b1b1b;
position:sticky;
top:0;
z-index:100;
}

.top-row{
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:14px;
position:relative;
padding-right:65px;
}

.center-row{
display:flex;
justify-content:center;
width:100%;
}

.top-btn{
border:none;
min-height:54px;
min-width:130px;
padding:0 20px;
border-radius:18px;
cursor:pointer;
font-size:17px;
font-weight:700;
transition:.2s;
color:white;
}

.top-btn:hover{transform:scale(1.03);}

.buy-btn{background:#4caf50;}
.sell-btn{background:#ff9800;}
.my-btn{background:#2196f3;}
.profile-btn{background:#000;}

.gray-btn{
background:#444;
border-radius:12px;
padding:6px 10px;
min-height:28px;
min-width:auto;
font-size:12px;
font-weight:700;
}

/* 👇 обновлённая кнопка профиля */
.small-profile{
position:absolute;
right:0;
top:0;
width:28px;
height:28px;
border-radius:8px;
font-size:14px;
display:flex;
justify-content:center;
align-items:center;
background:#000;
padding:0;
min-width:28px;
min-height:28px;
}

.centered-my{min-width:260px;}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}

.hidden{display:none;}

form{
background:#1f1f1f;
padding:20px;
border-radius:20px;
display:flex;
flex-direction:column;
gap:15px;
animation:fadeUp .3s ease;
}

input,select,textarea{
padding:14px;
border:none;
border-radius:14px;
outline:none;
font-size:16px;
background:#2a2a2a;
color:white;
}

textarea{resize:none;height:90px;}

.submit-btn{
border:none;
background:#00aaff;
color:white;
padding:15px;
border-radius:16px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.filters{
background:#1f1f1f;
padding:20px;
border-radius:20px;
display:none;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:8px;
margin-bottom:20px;
animation:fadeUp .3s ease;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.cards.compact{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}

.cards.list{display:flex;flex-direction:column;}

.card{
background:#1f1f1f;
border-radius:22px;
overflow:hidden;
cursor:pointer;
transition:.2s;
animation:fadeUp .3s ease;
}

.card:hover{transform:translateY(-5px);}

.card img{width:100%;height:220px;object-fit:cover;}

.no-image{
width:100%;
height:220px;
background:#2a2a2a;
display:flex;
justify-content:center;
align-items:center;
color:#777;
}

.card-content{
padding:16px;
display:flex;
flex-direction:column;
gap:8px;
}

.card-title{font-size:22px;font-weight:bold;}
.price{color:#4caf50;font-size:24px;font-weight:bold;}

.empty{
margin-top:70px;
text-align:center;
font-size:24px;
opacity:.85;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal-content{
background:#1f1f1f;
width:100%;
max-width:700px;
border-radius:24px;
overflow:hidden;
padding:20px;
}

.modal img{
width:100%;
max-height:400px;
object-fit:cover;
border-radius:16px;
}

.modal-body{
display:flex;
flex-direction:column;
gap:12px;
margin-top:15px;
}

.close-btn{
border:none;
background:red;
color:white;
padding:14px;
border-radius:14px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.profile-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.profile-box{
background:#1f1f1f;
padding:24px;
border-radius:24px;
width:90%;
max-width:420px;
}

.profile-title{
font-size:28px;
font-weight:bold;
margin-bottom:18px;
}

.profile-info{
display:flex;
flex-direction:column;
gap:12px;
font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="top-row">

<button class="top-btn buy-btn" onclick="showSection('buy')">Купить</button>
<button class="top-btn sell-btn" onclick="showSection('sell')">Продать</button>

<button class="top-btn profile-btn small-profile" onclick="openProfile()">👤</button>

</div>

<div class="center-row">
<button class="top-btn my-btn centered-my" onclick="showSection('my')">
Мои объявления
</button>
</div>

</header>

<div class="container">

<section id="sellSection">

<form id="sellForm">

<input type="text" id="title" placeholder="Название объявления" required>

<!-- 👇 заменён input file -->
<label style="display:flex;flex-direction:column;gap:6px;color:#aaa;font-size:14px;">
Фото
<input type="file" id="image" accept="image/*">
</label>

<select id="generation" required>
<option value="">Поколение</option>
</select>

<select id="rarity" required>
<option value="">Редкость</option>
<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>
</select>

<select id="biome" required>
<option value="">Биом</option>
<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
<option>Эхо</option>
</select>

<textarea id="features" maxlength="150" placeholder="Описание"></textarea>

<input type="number" id="price" placeholder="Цена TON" step="0.01" min="0.01" required>

<button class="submit-btn" type="submit">Создать объявление</button>

</form>

</section>

<section id="buySection" class="hidden">

<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px;">
<button class="top-btn gray-btn" onclick="toggleFilters()">Фильтры</button>
<button class="top-btn gray-btn" id="sortBtn">Цена ↓</button>
<button class="top-btn gray-btn" onclick="changeViewMode()">Вид</button>
</div>

<div class="filters" id="filters">

<select id="filterGeneration">
<option value="">Все поколения</option>
</select>

<select id="filterRarity">
<option value="">Любая редкость</option>
<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>
</select>

<select id="filterBiome">
<option value="">Любой биом</option>
<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
<option>Эхо</option>
</select>

</div>

<div class="cards" id="cards"></div>
<div class="empty" id="emptyText">Пока нет объявлений</div>

</section>

<section id="mySection" class="hidden">

<div class="cards" id="myCards"></div>
<div class="empty" id="myEmpty">У вас пока нет объявлений</div>

</section>

</div>

<div class="profile-modal" id="profileModal">
<div class="profile-box">

<div class="profile-title">Профиль</div>

<div class="profile-info">
<div id="profileName"></div>
<div id="profileUsername"></div>
</div>

<button class="close-btn" onclick="closeProfile()">Закрыть</button>

</div>
</div>

<script>

let tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;

if(user){
localStorage.setItem("telegramUsername", user.username || "unknown");
localStorage.setItem("telegramName", user.first_name || "Пользователь");
}

document.getElementById("profileName").textContent =
"Имя: " + (localStorage.getItem("telegramName") || "Пользователь");

document.getElementById("profileUsername").textContent =
"@" + (localStorage.getItem("telegramUsername") || "unknown");

let ads = JSON.parse(localStorage.getItem("ads")) || [];
let ascending = true;
let currentView = 0;

function saveAds(){
localStorage.setItem("ads", JSON.stringify(ads));
}

function deleteAd(id){
ads = ads.filter(a => a.id !== id);
saveAds();
renderAds();
renderMyAds();
}

function showSection(type){

document.getElementById("sellSection").classList.add("hidden");
document.getElementById("buySection").classList.add("hidden");
document.getElementById("mySection").classList.add("hidden");

if(type==="sell") document.getElementById("sellSection").classList.remove("hidden");
if(type==="buy"){ document.getElementById("buySection").classList.remove("hidden"); renderAds(); }
if(type==="my"){ document.getElementById("mySection").classList.remove("hidden"); renderMyAds(); }

}

function openProfile(){ document.getElementById("profileModal").style.display="flex"; }
function closeProfile(){ document.getElementById("profileModal").style.display="none"; }

function toggleFilters(){
const f=document.getElementById("filters");
f.style.display = f.style.display==="grid" ? "none" : "grid";
}

function changeViewMode(){
const cards=document.getElementById("cards");
currentView = (currentView+1)%3;
cards.classList.remove("compact","list");
if(currentView===1) cards.classList.add("compact");
if(currentView===2) cards.classList.add("list");
}

function getImageHTML(ad){
return ad.image
? `<img src="${ad.image}">`
: `<div class="no-image">Нет фото</div>`;
}

function openAd(ad){

const isOwner =
ad.owner === (localStorage.getItem("telegramUsername") || "unknown");

const modal=document.createElement("div");
modal.className="modal";
modal.style.display="flex";

modal.innerHTML=`

<div class="modal-content">

${ad.image ? `<img src="${ad.image}">` : `<div class="no-image">Нет фото</div>`}

<div class="modal-body">

<div class="card-title">${ad.title}</div>

<div><b>Поколение:</b> ${ad.generation}</div>
<div><b>Редкость:</b> ${ad.rarity}</div>
<div><b>Биом:</b> ${ad.biome}</div>
<div><b>Описание:</b> ${ad.features || "Нет"}</div>

<div class="price">${ad.price.toFixed(2)} TON</div>

${isOwner ? `
<button class="close-btn" style="background:#b00020"
onclick="deleteAd(${ad.id}); this.closest('.modal').remove();">
Удалить объявление
</button>` : ""}

<button class="close-btn" onclick="this.closest('.modal').remove()">Закрыть</button>

</div>

</div>
`;

document.body.appendChild(modal);
}

document.getElementById("sellForm").addEventListener("submit", e=>{
e.preventDefault();

const file=document.getElementById("image").files[0];

const createAd=(imageData=null)=>{
const ad={
id:Date.now(),
owner:localStorage.getItem("telegramUsername") || "unknown",
title:document.getElementById("title").value,
image:imageData,
generation:document.getElementById("generation").value,
rarity:document.getElementById("rarity").value,
biome:document.getElementById("biome").value,
features:document.getElementById("features").value,
price:parseFloat(document.getElementById("price").value)
};

ads.push(ad);
saveAds();
renderAds();
alert("Объявление создано!");
document.getElementById("sellForm").reset();
};

if(file){
const reader=new FileReader();
reader.onload=()=>createAd(reader.result);
reader.readAsDataURL(file);
}else{
createAd();
}
});

document.getElementById("sortBtn").addEventListener("click",()=>{
ascending=!ascending;
document.getElementById("sortBtn").textContent =
ascending ? "Цена ↓" : "Цена ↑";
renderAds();
});

["filterGeneration","filterRarity","filterBiome"].forEach(id=>{
document.getElementById(id).addEventListener("change",renderAds);
});

function renderAds(){
const cards=document.getElementById("cards");
cards.innerHTML="";

let filtered=[...ads];

const g=document.getElementById("filterGeneration").value;
const r=document.getElementById("filterRarity").value;
const b=document.getElementById("filterBiome").value;

if(g) filtered=filtered.filter(a=>a.generation==g);
if(r) filtered=filtered.filter(a=>a.rarity==r);
if(b) filtered=filtered.filter(a=>a.biome==b);

filtered.sort((a,b)=>ascending?a.price-b.price:b.price-a.price);

document.getElementById("emptyText").style.display =
filtered.length ? "none":"block";

filtered.forEach(ad=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
${getImageHTML(ad)}
<div class="card-content">
<div class="card-title">${ad.title}</div>
<div>${ad.rarity}</div>
<div>${ad.biome}</div>
<div class="price">${ad.price.toFixed(2)} TON</div>
</div>
`;

card.onclick=()=>openAd(ad);
cards.appendChild(card);
});
}

function renderMyAds(){
const myCards=document.getElementById("myCards");
myCards.innerHTML="";

const myAds=ads;

document.getElementById("myEmpty").style.display =
myAds.length ? "none":"block";

myAds.forEach(ad=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
${getImageHTML(ad)}
<div class="card-content">
<div class="card-title">${ad.title}</div>
<div class="price">${ad.price.toFixed(2)} TON</div>
</div>
`;

card.onclick=()=>openAd(ad);
myCards.appendChild(card);
});
}

showSection("buy");

</script>
</body>
</html>
