<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TON Market</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-zinc-950 text-white min-h-screen overflow-x-hidden">

  <div class="max-w-7xl mx-auto p-3 sm:p-4 pb-10 overflow-x-hidden">

    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">

      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full bg-zinc-800 overflow-hidden border border-zinc-700">
          <img id="profilePhoto" class="w-full h-full object-cover hidden" />
          <div id="profilePlaceholder" class="w-full h-full flex items-center justify-center text-xl">
            👤
          </div>
        </div>

        <div>
          <div id="profileName" class="font-bold text-lg">
            Telegram Profile
          </div>

          <div id="profileUsername" class="text-zinc-400 text-sm">
            @username
          </div>
        </div>
      </div>

      <div class="flex gap-2 w-full">

        <button
          onclick="openSellModal()"
          class="flex-1 min-w-0 bg-emerald-500 hover:bg-emerald-600 transition px-5 py-3 rounded-2xl font-semibold text-center break-words leading-tight"
        >
          Продать
        </button>

        <button
          onclick="showTab('buy')"
          class="flex-1 min-w-0 bg-blue-500 hover:bg-blue-600 transition px-5 py-3 rounded-2xl font-semibold text-center break-words leading-tight"
        >
          Купить
        </button>

        <button
          onclick="showTab('my')"
          class="flex-1 min-w-0 bg-zinc-800 hover:bg-zinc-700 transition px-5 py-3 rounded-2xl font-semibold border border-zinc-700 text-center break-words leading-tight"
        >
          Мои объявления
        </button>

      </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 mb-5">

      <div
        class="flex items-center justify-between cursor-pointer"
        onclick="toggleFilters()"
      >

        <div class="flex items-center gap-3 flex-wrap">
          <h2 class="text-xl font-bold">
            Поиск и фильтры
          </h2>

          <button
            onclick="event.stopPropagation(); changeView()"
            class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm border border-zinc-700"
          >
            Вид:
            <span id="viewModeText">
              Обычный
            </span>
          </button>
        </div>

        <div id="filterArrow" class="text-2xl transition">
          ⬇
        </div>

      </div>

      <div id="filtersBlock" class="mt-5 hidden">

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">

          <input
            id="searchInput"
            type="text"
            placeholder="Поиск по названию..."
            class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none"
          />

          <select
            id="generationFilter"
            class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"
          >
            <option value="">
              Поколение
            </option>
          </select>

          <select
            id="rarityFilter"
            class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"
          >
            <option value="">
              Редкость
            </option>

            <option>Обычный</option>
            <option>Редкий</option>
            <option>Мифический</option>
            <option>Легендарный</option>
            <option>Мутант</option>
          </select>

          <select
            id="biomeFilter"
            class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"
          >
            <option value="">
              Биом
            </option>

            <option>Луг</option>
            <option>Лес</option>
            <option>Пустыня</option>
            <option>Горы</option>
            <option>Море</option>
            <option>Грядки</option>
            <option>Лёд</option>
            <option>Эхо</option>
          </select>

        </div>

        <div class="flex flex-wrap items-center gap-2 mt-4">

          <button
            id="sortButton"
            onclick="toggleSort()"
            class="bg-purple-600 hover:bg-purple-700 rounded-xl px-3 py-2 text-sm font-semibold"
          >
            Цена ↑
          </button>

          <input
            id="minPriceFilter"
            type="number"
            min="0"
            placeholder="Мин"
            class="w-24 bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-sm outline-none"
          />

          <input
            id="maxPriceFilter"
            type="number"
            min="0"
            placeholder="Макс"
            class="w-24 bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-sm outline-none"
          />

        </div>

      </div>

    </div>

    <div id="marketContainer"></div>

  </div>

  <div
    id="sellModal"
    class="fixed inset-0 bg-black/70 hidden items-start justify-center z-50 p-3 overflow-y-auto overscroll-contain"
  >

    <div
      class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 sm:p-6 w-full max-w-2xl my-4 sm:my-10"
    >

      <div class="flex items-center justify-between mb-6">

        <h2 class="text-2xl font-bold">
          Создать объявление
        </h2>

        <button onclick="closeSellModal()" class="text-2xl">
          ✕
        </button>

      </div>

      <div class="grid gap-4">

        <input
          id="itemTitle"
          maxlength="50"
          type="text"
          placeholder="Название"
          class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none"
        />

        <input
          id="telegramUsername"
          maxlength="40"
          type="text"
          readonly
          class="bg-zinc-700 text-zinc-400 border border-zinc-700 rounded-xl px-4 py-3 outline-none w-full cursor-not-allowed"
        />

        <input
          id="imageInput"
          type="file"
          accept="image/*"
          class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 w-full overflow-hidden"
        />

        <select
          id="generationInput"
          class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"
        >
          <option value="">Выберите поколение</option>
        </select>

        <select
          id="rarityInput"
          class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"
        >
          <option value="">Редкость</option>
          <option>Обычный</option>
          <option>Редкий</option>
          <option>Мифический</option>
          <option>Легендарный</option>
          <option>Мутант</option>
        </select>

        <select
          id="biomeInput"
          class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3"
        >
          <option value="">Биом</option>
          <option>Луг</option>
          <option>Лес</option>
          <option>Пустыня</option>
          <option>Горы</option>
          <option>Море</option>
          <option>Грядки</option>
          <option>Лёд</option>
          <option>Эхо</option>
        </select>

        <textarea
          id="descriptionInput"
          maxlength="150"
          placeholder="Особенности"
          class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 h-28 resize-none outline-none"
        ></textarea>

        <input
          id="priceInput"
          step="0.01"
          min="0"
          type="number"
          placeholder="Цена Ton"
          class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none"
        />

        <button
          onclick="createListing()"
          class="w-full bg-emerald-500 hover:bg-emerald-600 transition py-4 rounded-2xl font-bold text-lg"
        >
          Выставить на продажу
        </button>

      </div>
    </div>
  </div>

  <script>

    const SUPABASE_URL = 'https://jxqgbxchaepryjvrmkxw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4cWdieGNoYWVwcnlqdnJta3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTUzNDksImV4cCI6MjA5NTQ3MTM0OX0.tKfKzsWI8ZQ99Z5q0K1fTMgFEvstdjyDZiDRzqRcNhs';


    const db = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    const tg = window.Telegram?.WebApp;

    let telegramUser = {
      first_name: 'Пользователь',
      username: 'telegram',
      photo_url: ''
    };

    if (tg) {
      tg.expand();
      tg.ready();

      if (tg.initDataUnsafe?.user) {
        telegramUser = tg.initDataUnsafe.user;
      }
    }

    let listings = [];

    document.getElementById('profileName').innerText =
      telegramUser.first_name || 'Пользователь';

    document.getElementById('profileUsername').innerText =
      telegramUser.username
      ? '@' + telegramUser.username
      : '@telegram';

    document.getElementById('telegramUsername').value =
      telegramUser.username || '';

    async function loadListings() {

      const { data, error } = await db
        .from('listings')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.log(error);
        return;
      }

      listings = (data || []).map(item => ({
        ...item,
        ownerName: item.owner_name,
        createdAt: item.created_at
      }));

      renderListings();
    }

    async function compressImage(file) {

      return new Promise(resolve => {

        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => {
          img.src = e.target.result;
        };

        img.onload = () => {

          const canvas = document.createElement('canvas');

          const maxWidth = 1200;

          const scale = maxWidth / img.width;

          canvas.width = maxWidth;
          canvas.height = img.height * scale;

          const ctx = canvas.getContext('2d');

          ctx.drawImage(
            img,
            0,
            0,
            canvas.width,
            canvas.height
          );

          canvas.toBlob(
            blob => resolve(blob),
            'image/jpeg',
            0.7
          );
        };

        reader.readAsDataURL(file);
      });
    }

    async function uploadImage(file) {

      const fileName = `${crypto.randomUUID()}.jpg`;
      const filePath = `listings/${fileName}`;

      const { error } = await db.storage
        .from('listing-images')
        .upload(filePath, file);

      if (error) {
        console.log(error);
        return '';
      }

      const { data } = db.storage
        .from('listing-images')
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    async function saveListingToSupabase(listing) {

      const { error } = await db
        .from('listings')
        .insert([{
          id: listing.id,
          owner: listing.owner,
          owner_name: listing.ownerName,
          title: listing.title,
          username: listing.username,
          generation: listing.generation,
          rarity: listing.rarity,
          biome: listing.biome,
          description: listing.description,
          price: listing.price,
          image: listing.image,
        }]);

      if (error) {
        console.log(error);
      }
    }

    async function createListing() {

      const title =
        document.getElementById('itemTitle').value.trim();

      const username =
        document.getElementById('telegramUsername').value.trim();

      const generation =
        document.getElementById('generationInput').value;

      const rarity =
        document.getElementById('rarityInput').value;

      const biome =
        document.getElementById('biomeInput').value;

      const description =
        document.getElementById('descriptionInput').value.trim();

      const price =
        parseFloat(document.getElementById('priceInput').value);

      const imageFile =
        document.getElementById('imageInput').files[0];

      if (
        !title ||
        !username ||
        !generation ||
        !rarity ||
        !biome ||
        !description ||
        isNaN(price)
      ) {
        alert('Заполните все поля');
        return;
      }

      let imageUrl = '';

      if (imageFile) {

        const compressed = await compressImage(imageFile);

        imageUrl = await uploadImage(compressed);
      }

      const listing = {

        id: crypto.randomUUID(),

        owner: telegramUser.username || username,

        ownerName:
          telegramUser.first_name || 'Пользователь',

        title,
        username,
        generation,
        rarity,
        biome,
        description,

        price: Number(price.toFixed(2)),

        image: imageUrl,

        createdAt: new Date().toISOString()
      };

      listings.unshift(listing);

      renderListings();

      closeSellModal();

      clearForm();

      saveListingToSupabase(listing);
    }

    function clearForm() {

      document.getElementById('itemTitle').value = '';
      document.getElementById('generationInput').value = '';
      document.getElementById('rarityInput').value = '';
      document.getElementById('biomeInput').value = '';
      document.getElementById('descriptionInput').value = '';
      document.getElementById('priceInput').value = '';
      document.getElementById('imageInput').value = '';
    }

    async function removeListing(id) {

      if (!confirm('Удалить объявление?'))
        return;

      const item = listings.find(x => x.id === id);

      if (!item) return;

      if (item.image) {

        const imagePath =
          item.image.split('/listing-images/')[1];

        if (imagePath) {

          await db.storage
            .from('listing-images')
            .remove([imagePath]);
        }
      }

      await db
        .from('listings')
        .delete()
        .eq('id', id);

      listings = listings.filter(x => x.id !== id);

      renderListings();
    }

    function openSellModal() {

      document
        .getElementById('sellModal')
        .classList.remove('hidden');

      document
        .getElementById('sellModal')
        .classList.add('flex');
    }

    function closeSellModal() {

      document
        .getElementById('sellModal')
        .classList.add('hidden');

      document
        .getElementById('sellModal')
        .classList.remove('flex');
    }

    function renderListings() {

      const container =
        document.getElementById('marketContainer');

      if (!listings.length) {

        container.innerHTML = `
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-12 text-center text-zinc-400 text-xl">
            Объявлений пока нет
          </div>
        `;

        return;
      }

      container.className =
        'grid md:grid-cols-2 xl:grid-cols-3 gap-5';

      container.innerHTML = listings.map(item => `

        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">

          ${
            item.image
            ? `<img src="${item.image}" class="w-full h-56 object-cover" />`
            : `<div class="w-full h-56 bg-zinc-800 flex items-center justify-center text-6xl">📦</div>`
          }

          <div class="p-5 space-y-3">

            <div class="flex items-start justify-between gap-3">

              <div>
                <h3 class="font-bold text-xl">
                  ${item.title}
                </h3>

                <div class="text-zinc-400 text-sm">
                  @${item.username}
                </div>
              </div>

              <div class="bg-emerald-500 text-black px-3 py-2 rounded-xl font-bold whitespace-nowrap">
                ${item.price} TON
              </div>

            </div>

            <div class="flex flex-wrap gap-2 text-sm">

              <div class="bg-zinc-800 px-3 py-1 rounded-full">
                ${item.rarity}
              </div>

              <div class="bg-zinc-800 px-3 py-1 rounded-full">
                ${item.biome}
              </div>

              <div class="bg-zinc-800 px-3 py-1 rounded-full">
                Gen ${item.generation}
              </div>

            </div>

            ${
              item.owner === telegramUser.username
              ? `
                <button
                  onclick="removeListing('${item.id}')"
                  class="w-full bg-red-500 hover:bg-red-600 transition py-3 rounded-2xl font-bold mt-3"
                >
                  Удалить
                </button>
              `
              : ''
            }

          </div>

        </div>

      `).join('');
    }

    loadListings();

  </script>

</body>
</html>
