<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TON Market</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:15px;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid #1f2937;
}

.topbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

button{
    background:#2563eb;
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
}

.secondary{
    background:#374151;
}

.profile{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:10px;
    background:#1e293b;
    padding:8px 12px;
    border-radius:12px;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.panel{
    background:#111827;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

input, select, textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:white;
}

textarea{
    resize:none;
}

.hidden{
    display:none;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#111827;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s;
    border:1px solid #1f2937;
}

.card:hover{
    transform:translateY(-3px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    background:#1f2937;
}

.card-body{
    padding:15px;
}

.price{
    color:#38bdf8;
    font-weight:bold;
    margin-top:10px;
}

.tag{
    display:inline-block;
    padding:4px 8px;
    background:#1e293b;
    border-radius:8px;
    margin-right:5px;
    margin-top:5px;
    font-size:12px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
}

.modal-content{
    width:90%;
    max-width:600px;
    background:#111827;
    border-radius:20px;
    padding:25px;
}

.close{
    float:right;
    cursor:pointer;
    font-size:24px;
}

.username{
    color:#38bdf8;
    cursor:pointer;
}

.compact .card img{
    display:none;
}

.compact .cards{
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
}

.list .cards{
    display:flex;
    flex-direction:column;
}

.list .card{
    display:flex;
    align-items:center;
}

.list .card img{
    display:none;
}

.list .card-body{
    width:100%;
}

.search-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
}

.arrow{
    font-size:24px;
    cursor:pointer;
}

.remove-btn{
    background:#dc2626;
    margin-top:15px;
}

.telegram-box{
    margin-top:15px;
    background:#1e293b;
    padding:15px;
    border-radius:12px;
}

</style>
</head>
<body>

<header>
    <div class="topbar">
        <button onclick="showSection('sell')">Продать</button>
        <button onclick="showSection('buy')">Купить</button>
        <button onclick="showSection('myAds')">Мои объявления</button>

        <button class="secondary" onclick="changeView()">
            Сменить вид
        </button>

        <div class="profile">
            👤
            <div>
                <div id="profileName">Telegram User</div>
                <small>@telegram</small>
            </div>
        </div>
    </div>
</header>

<div class="container">

    <!-- SELL -->
    <div id="sellSection" class="panel hidden">
        <h2>Создать объявление</h2>

        <label>Название</label>
        <input type="text" id="title" placeholder="Название">

        <label>Username Telegram</label>
        <input type="text" id="tg" placeholder="@username">

        <label>Скриншот (необязательно)</label>
        <input type="file" id="image">

        <label>Поколение</label>
        <select id="generation">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
        </select>

        <label>Редкость</label>
        <select id="rarity">
            <option>Обычный</option>
            <option>Редкий</option>
            <option>Мифический</option>
            <option>Легендарный</option>
            <option>Мутант</option>
        </select>

        <label>Биом</label>
        <select id="biome">
            <option>Луг</option>
            <option>Лес</option>
            <option>Пустыня</option>
            <option>Горы</option>
            <option>Море</option>
            <option>Грядки</option>
            <option>Лёд</option>
        </select>

        <label>Особенности</label>
        <textarea maxlength="150" id="desc"></textarea>

        <label>Цена Ton</label>
        <input type="number" step="0.01" id="price" placeholder="0.00">

        <button onclick="createAd()">Выставить</button>
    </div>

    <!-- BUY -->
    <div id="buySection">

        <div class="panel">

            <div class="search-header">
                <h2>Поиск</h2>
                <div class="arrow" onclick="toggleFilters()">▼</div>
            </div>

            <div id="filters">

                <label>Поколение</label>
                <select id="filterGeneration">
                    <option value="">Все</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>

                <label>Редкость</label>
                <select id="filterRarity">
                    <option value="">Все</option>
                    <option>Обычный</option>
                    <option>Редкий</option>
                    <option>Мифический</option>
                    <option>Легендарный</option>
                    <option>Мутант</option>
                </select>

                <label>Биом</label>
                <select id="filterBiome">
                    <option value="">Все</option>
                    <option>Луг</option>
                    <option>Лес</option>
                    <option>Пустыня</option>
                    <option>Горы</option>
                    <option>Море</option>
                    <option>Грядки</option>
                    <option>Лёд</option>
                </select>

                <button onclick="toggleSort()">
                    Сортировка цены
                </button>

                <button onclick="applyFilters()">
                    Применить
                </button>

            </div>

        </div>

        <div class="cards" id="cards"></div>
    </div>

    <!-- MY ADS -->
    <div id="myAdsSection" class="hidden">
        <div class="cards" id="myCards"></div>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <div id="modalBody"></div>
    </div>
</div>

<!-- TG CONFIRM -->
<div id="tgModal" class="modal hidden">
    <div class="modal-content">
        <h2>Предупреждение</h2>

        <p style="margin-top:15px;">
            Вы уверены, что хотите перейти к пользователю?
            Площадка не несёт ответственность за покупки вне приложения.
        </p>

        <div style="display:flex;gap:10px;margin-top:20px;">
            <button onclick="goTelegram()">Перейти</button>
            <button class="secondary" onclick="disableWarning()">
                Больше не присылать
            </button>
        </div>
    </div>
</div>

<script>

let ads = JSON.parse(localStorage.getItem("ads")) || [];
let myAds = JSON.parse(localStorage.getItem("myAds")) || [];

let currentSort = "asc";
let currentView = 0;
let tgLink = "";

function save(){
    localStorage.setItem("ads", JSON.stringify(ads));
    localStorage.setItem("myAds", JSON.stringify(myAds));
}

function showSection(type){

    document.getElementById("sellSection").classList.add("hidden");
    document.getElementById("buySection").classList.add("hidden");
    document.getElementById("myAdsSection").classList.add("hidden");

    if(type==="sell"){
        document.getElementById("sellSection").classList.remove("hidden");
    }

    if(type==="buy"){
        document.getElementById("buySection").classList.remove("hidden");
    }

    if(type==="myAds"){
        document.getElementById("myAdsSection").classList.remove("hidden");
        renderMyAds();
    }
}

function createAd(){

    const file = document.getElementById("image").files[0];

    const ad = {
        id:Date.now(),
        title:document.getElementById("title").value,
        tg:document.getElementById("tg").value,
        generation:document.getElementById("generation").value,
        rarity:document.getElementById("rarity").value,
        biome:document.getElementById("biome").value,
        desc:document.getElementById("desc").value,
        price:parseFloat(document.getElementById("price").value),
        image:""
    };

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            ad.image = e.target.result;
            finishCreate(ad);
        };

        reader.readAsDataURL(file);

    } else {
        finishCreate(ad);
    }
}

function finishCreate(ad){
    ads.push(ad);
    myAds.push(ad);
    save();
    renderAds();
    alert("Объявление создано");
}

function renderAds(data = ads){

    const cards = document.getElementById("cards");

    cards.innerHTML = "";

    data.forEach(ad=>{

        cards.innerHTML += `
            <div class="card" onclick="openAd(${ad.id})">

                ${
                    ad.image
                    ? `<img src="${ad.image}">`
                    : ``
                }

                <div class="card-body">

                    <h3>${ad.title}</h3>

                    <div class="tag">
                        Gen ${ad.generation}
                    </div>

                    <div class="tag">
                        ${ad.rarity}
                    </div>

                    <div class="tag">
                        ${ad.biome}
                    </div>

                    <div class="price">
                        ${ad.price} TON
                    </div>

                </div>

            </div>
        `;
    });
}

function renderMyAds(){

    const cards = document.getElementById("myCards");

    cards.innerHTML = "";

    myAds.forEach(ad=>{

        cards.innerHTML += `
            <div class="card">

                ${
                    ad.image
                    ? `<img src="${ad.image}">`
                    : ``
                }

                <div class="card-body">

                    <h3>${ad.title}</h3>

                    <div class="price">
                        ${ad.price} TON
                    </div>

                    <button class="remove-btn" onclick="removeAd(${ad.id})">
                        Снять с продажи
                    </button>

                </div>

            </div>
        `;
    });
}

function removeAd(id){

    ads = ads.filter(a=>a.id!==id);
    myAds = myAds.filter(a=>a.id!==id);

    save();

    renderAds();
    renderMyAds();
}

function openAd(id){

    const ad = ads.find(a=>a.id===id);

    document.getElementById("modal").classList.remove("hidden");

    document.getElementById("modalBody").innerHTML = `

        ${
            ad.image
            ? `<img src="${ad.image}" style="width:100%;border-radius:16px;">`
            : ``
        }

        <h2 style="margin-top:15px;">
            ${ad.title}
        </h2>

        <div style="margin-top:15px;">

            <div class="tag">
                Поколение ${ad.generation}
            </div>

            <div class="tag">
                ${ad.rarity}
            </div>

            <div class="tag">
                ${ad.biome}
            </div>

        </div>

        <p style="margin-top:20px;">
            ${ad.desc}
        </p>

        <div class="price" style="margin-top:20px;">
            ${ad.price} TON
        </div>

        <div class="telegram-box">
            Продавец:
            <div class="username"
                 onclick="openTelegram('${ad.tg}')">
                 ${ad.tg}
            </div>
        </div>
    `;
}

function closeModal(){
    document.getElementById("modal").classList.add("hidden");
}

function applyFilters(){

    const gen = document.getElementById("filterGeneration").value;
    const rarity = document.getElementById("filterRarity").value;
    const biome = document.getElementById("filterBiome").value;

    let filtered = ads.filter(ad=>{

        return (
            (!gen || ad.generation===gen) &&
            (!rarity || ad.rarity===rarity) &&
            (!biome || ad.biome===biome)
        );
    });

    filtered.sort((a,b)=>
        currentSort==="asc"
        ? a.price - b.price
        : b.price - a.price
    );

    renderAds(filtered);
}

function toggleSort(){
    currentSort = currentSort==="asc" ? "desc" : "asc";
    applyFilters();
}

function toggleFilters(){

    const filters = document.getElementById("filters");

    filters.classList.toggle("hidden");
}

function changeView(){

    currentView++;

    if(currentView>2){
        currentView=0;
    }

    document.body.classList.remove("compact");
    document.body.classList.remove("list");

    if(currentView===1){
        document.body.classList.add("compact");
    }

    if(currentView===2){
        document.body.classList.add("list");
    }
}

function openTelegram(username){

    if(localStorage.getItem("disableWarning")){
        window.open("https://t.me/" + username.replace("@",""));
        return;
    }

    tgLink = username;

    document.getElementById("tgModal")
        .classList.remove("hidden");
}

function goTelegram(){

    window.open("https://t.me/" + tgLink.replace("@",""));

    document.getElementById("tgModal")
        .classList.add("hidden");
}

function disableWarning(){

    localStorage.setItem("disableWarning", true);

    document.getElementById("tgModal")
        .classList.add("hidden");
}

/*
Telegram WebApp example
Автоподключение Telegram через бота
*/

if(window.Telegram && Telegram.WebApp){

    Telegram.WebApp.ready();

    const user = Telegram.WebApp.initDataUnsafe.user;

    if(user){

        document.getElementById("profileName")
            .innerText = user.first_name;

        document.querySelector(".profile small")
            .innerText = "@" + (user.username || "telegram");
    }
}

renderAds();

</script>

</body>
</html>
