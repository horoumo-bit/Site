<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gatto Shop</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    background:#020202;
    color:white;
    font-family:Inter,sans-serif;
    overflow-x:hidden;
}

.dark-box{
    background:linear-gradient(180deg,#070707,#030303);
    border:1px solid rgba(255,255,255,.04);
}

.input-dark{
    background:#050505;
    border:1px solid rgba(255,255,255,.05);
}

.input-dark:focus{
    outline:none;
    border-color:#1f2937;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:16px;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-3">

    <!-- PROFILE -->
    <div class="dark-box rounded-xl p-5 flex items-center justify-between">

        <div class="flex items-center gap-4">

            <div class="w-16 h-16 rounded-full border border-zinc-700 bg-zinc-900 flex items-center justify-center overflow-hidden">
                <img id="profilePhoto"
                     class="w-full h-full object-cover hidden">

                <svg id="profileIcon"
                     xmlns="http://www.w3.org/2000/svg"
                     class="w-8 h-8 text-zinc-400"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">

                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="1.5"
                          d="M15.75 6.75a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zm-9 13.5a5.25 5.25 0 0110.5 0"/>
                </svg>
            </div>

            <div>
                <div id="profileName" class="text-3xl font-bold">
                    Пользователь
                </div>

                <div id="profileUsername" class="text-blue-400 text-lg">
                    @telegram
                </div>
            </div>

        </div>

    </div>

    <!-- TOP BUTTONS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-4">

        <button id="sellBtn"
                class="bg-[#0a0a0a] border border-zinc-800 rounded-xl h-16 text-xl font-semibold hover:bg-[#111] transition">
            Продать
        </button>

        <button class="bg-[#0a0a0a] border border-zinc-800 rounded-xl h-16 text-xl font-semibold hover:bg-[#111] transition">
            Купить
        </button>

        <button id="myAdsBtn"
                class="bg-[#0a0a0a] border border-zinc-800 rounded-xl h-16 text-xl font-semibold hover:bg-[#111] transition">
            Мои объявления
        </button>

    </div>

    <!-- FILTER -->
    <div class="dark-box rounded-xl p-5 mt-4">

        <div class="flex items-center justify-between cursor-pointer">

            <div class="text-2xl font-semibold">
                Фильтры поиска
            </div>

            <div class="text-2xl text-zinc-500">
                ⌄
            </div>

        </div>

    </div>

    <!-- FILTERS -->
    <div class="dark-box rounded-xl p-5 mt-4">

        <div class="flex flex-col xl:flex-row gap-4 xl:items-center xl:justify-between">

            <div class="flex items-center gap-3 flex-wrap">

                <div class="text-lg text-zinc-300">
                    Цена (Ton):
                </div>

                <input
                    id="minPrice"
                    type="number"
                    step="0.01"
                    placeholder="от"
                    class="input-dark rounded-lg px-4 h-12 w-28 text-white"
                >

                <div class="text-zinc-500">
                    —
                </div>

                <input
                    id="maxPrice"
                    type="number"
                    step="0.01"
                    placeholder="до"
                    class="input-dark rounded-lg px-4 h-12 w-28 text-white"
                >

            </div>

            <div class="flex items-center gap-3">

                <select id="sortSelect"
                        class="input-dark rounded-lg px-4 h-12 text-white">
                    <option value="asc">По возрастанию цены</option>
                    <option value="desc">По убыванию цены</option>
                </select>

            </div>

        </div>

    </div>

    <!-- VIEW SWITCH -->
    <div class="dark-box rounded-xl p-2 mt-4 grid grid-cols-3 gap-2">

        <button class="bg-[#0d0d0d] border border-zinc-800 rounded-lg h-14 text-lg">
            Обычный
        </button>

        <button class="rounded-lg h-14 text-lg text-zinc-500">
            Квадраты
        </button>

        <button class="rounded-lg h-14 text-lg text-zinc-500">
            Линия
        </button>

    </div>

    <!-- ADS -->
    <div id="adsContainer"
         class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mt-4">
    </div>

</div>

<!-- SELL MODAL -->
<div id="sellModal" class="modal hidden">

    <div class="dark-box rounded-xl p-5 w-full max-w-xl max-h-[95vh] overflow-y-auto">

        <div class="flex items-center justify-between mb-4">

            <div class="text-3xl font-bold">
                Создать объявление
            </div>

            <button onclick="closeSellModal()" class="text-3xl">
                ✕
            </button>

        </div>

        <div class="space-y-4">

            <input id="adName"
                   placeholder="Название"
                   class="input-dark rounded-lg px-4 h-14 w-full text-white">

            <input id="adUsername"
                   placeholder="@telegram"
                   class="input-dark rounded-lg px-4 h-14 w-full text-white">

            <input id="adPhoto"
                   type="file"
                   accept="image/*"
                   class="input-dark rounded-lg px-4 py-4 w-full text-white">

            <select id="adGeneration"
                    class="input-dark rounded-lg px-4 h-14 w-full text-white">

                <option value="">Поколение</option>

                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>

            </select>

            <select id="adRarity"
                    class="input-dark rounded-lg px-4 h-14 w-full text-white">

                <option>Обычный</option>
                <option>Редкий</option>
                <option>Мифический</option>
                <option>Легендарный</option>
                <option>Мутант</option>

            </select>

            <select id="adBiome"
                    class="input-dark rounded-lg px-4 h-14 w-full text-white">

                <option>Луг</option>
                <option>Лес</option>
                <option>Пустыня</option>
                <option>Горы</option>
                <option>Море</option>
                <option>Грядки</option>
                <option>Лёд</option>
                <option>Эхо</option>

            </select>

            <textarea id="adDescription"
                      maxlength="150"
                      placeholder="Описание"
                      class="input-dark rounded-lg p-4 w-full h-32 text-white"></textarea>

            <input id="adPrice"
                   type="number"
                   step="0.01"
                   placeholder="Цена Ton"
                   class="input-dark rounded-lg px-4 h-14 w-full text-white">

            <button onclick="createAd()"
                    class="bg-[#0a0a0a] border border-zinc-800 rounded-xl h-14 w-full text-xl font-semibold hover:bg-[#111] transition">

                Выставить

            </button>

        </div>

    </div>

</div>

<!-- AD VIEW -->
<div id="viewModal" class="modal hidden">

    <div id="viewContent"
         class="dark-box rounded-xl overflow-hidden w-full max-w-2xl max-h-[95vh] overflow-y-auto">
    </div>

</div>

<script>
const tg = window.Telegram?.WebApp;

if(tg){
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    if(user){

        document.getElementById('profileName').textContent =
            user.first_name || 'Пользователь';

        document.getElementById('profileUsername').textContent =
            '@' + (user.username || 'telegram');

        document.getElementById('adUsername').value =
            user.username || '';

        if(user.photo_url){

            const img = document.getElementById('profilePhoto');
            img.src = user.photo_url;
            img.classList.remove('hidden');

            document.getElementById('profileIcon').style.display='none';
        }
    }
}

let ads = JSON.parse(localStorage.getItem('gatto_ads') || '[]');

function saveAds(){
    localStorage.setItem('gatto_ads', JSON.stringify(ads));
}

function renderAds(){

    const container = document.getElementById('adsContainer');

    container.innerHTML = '';

    let filteredAds = [...ads];

    const minPrice = parseFloat(document.getElementById('minPrice').value);
    const maxPrice = parseFloat(document.getElementById('maxPrice').value);

    if(!isNaN(minPrice)){
        filteredAds = filteredAds.filter(ad => Number(ad.price) >= minPrice);
    }

    if(!isNaN(maxPrice)){
        filteredAds = filteredAds.filter(ad => Number(ad.price) <= maxPrice);
    }

    const sortType = document.getElementById('sortSelect').value;

    filteredAds.sort((a,b)=>{
        return sortType === 'asc'
            ? Number(a.price) - Number(b.price)
            : Number(b.price) - Number(a.price);
    });

    if(filteredAds.length === 0){

        container.innerHTML = `
        <div class="dark-box rounded-xl h-[500px] flex items-center justify-center col-span-full">

            <div class="text-center">

                <div class="text-6xl mb-4 text-zinc-700">
                    ⊘
                </div>

                <div class="text-2xl text-zinc-500">
                    Объявлений пока нет
                </div>

            </div>

        </div>
        `;

        return;
    }

    filteredAds.forEach((ad,index)=>{

        container.innerHTML += `
        <div onclick="openAd(${index})"
             class="dark-box rounded-xl overflow-hidden cursor-pointer hover:bg-[#090909] transition">

            ${
                ad.image
                ? `<img src="${ad.image}" class="w-full h-64 object-cover">`
                : `<div class="h-64 flex items-center justify-center text-6xl text-zinc-700">⊘</div>`
            }

            <div class="p-5">

                <div class="text-2xl font-bold mb-3">
                    ${ad.name}
                </div>

                <div class="space-y-2 text-zinc-400">

                    <div>Поколение: ${ad.generation}</div>
                    <div>Редкость: ${ad.rarity}</div>
                    <div>Биом: ${ad.biome}</div>

                </div>

            </div>

            <div class="border-t border-zinc-900 p-5 text-cyan-400 text-2xl font-bold">
                ${Number(ad.price).toFixed(2)} Ton
            </div>

        </div>
        `;
    });
}

function openSellModal(){
    document.getElementById('sellModal').classList.remove('hidden');
}

function closeSellModal(){
    document.getElementById('sellModal').classList.add('hidden');
}

function createAd(){

    const file = document.getElementById('adPhoto').files[0];

    const reader = new FileReader();

    reader.onload = function(){

        ads.unshift({
            name: document.getElementById('adName').value,
            username: document.getElementById('adUsername').value,
            generation: document.getElementById('adGeneration').value,
            rarity: document.getElementById('adRarity').value,
            biome: document.getElementById('adBiome').value,
            description: document.getElementById('adDescription').value,
            price: document.getElementById('adPrice').value,
            image: file ? reader.result : null
        });

        saveAds();
        renderAds();
        closeSellModal();
    };

    if(file){
        reader.readAsDataURL(file);
    }else{
        reader.onload();
    }
}

function openAd(index){

    const ad = ads[index];

    document.getElementById('viewContent').innerHTML = `

        ${
            ad.image
            ? `<img src="${ad.image}" class="w-full h-80 object-cover">`
            : ''
        }

        <div class="p-6">

            <div class="text-4xl font-bold mb-2">
                ${ad.name}
            </div>

            <div class="text-blue-400 text-lg mb-6">
                @${ad.username}
            </div>

            <div class="space-y-3 text-lg text-zinc-300">

                <div>Поколение: ${ad.generation}</div>
                <div>Редкость: ${ad.rarity}</div>
                <div>Биом: ${ad.biome}</div>

            </div>

            <div class="mt-6 text-zinc-400 text-lg">
                ${ad.description || 'Без описания'}
            </div>

            <div class="mt-6 text-cyan-400 text-4xl font-bold">
                ${Number(ad.price).toFixed(2)} Ton
            </div>

            <a href="https://t.me/${ad.username}"
               target="_blank"
               class="mt-6 flex items-center justify-center bg-[#0a0a0a] border border-zinc-800 rounded-xl h-14 text-xl font-semibold hover:bg-[#111] transition">

                Написать в Telegram

            </a>

        </div>
    `;

    document.getElementById('viewModal').classList.remove('hidden');
}

document.getElementById('viewModal').onclick = function(e){

    if(e.target.id === 'viewModal'){
        this.classList.add('hidden');
    }
};

document.getElementById('sellBtn').onclick = openSellModal;

document.getElementById('minPrice').oninput = renderAds;
document.getElementById('maxPrice').oninput = renderAds;
document.getElementById('sortSelect').onchange = renderAds;

renderAds();
</script>

</body>
</html>
