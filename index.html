<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gatto Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
min-height:100vh;
overflow-x:hidden;
padding-bottom:30px;
}

:root{
--bg:#111;
--card:#1d1d1d;
--card2:#262626;
--green:#4caf50;
--orange:#ff9800;
--blue:#2196f3;
--gray:#444;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.03)}
100%{transform:scale(1)}
}

header{
position:sticky;
top:0;
z-index:100;
background:rgba(17,17,17,.96);
backdrop-filter:blur(12px);
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.top-row{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
position:relative;
}

.top-btn{
border:none;
color:#fff;
font-weight:700;
cursor:pointer;
transition:.18s;
}

.top-btn:active{
transform:scale(.96);
}

.buy-btn,
.sell-btn{
height:50px;
padding:0 20px;
border-radius:16px;
font-size:16px;
min-width:120px;
}

.buy-btn{
background:var(--green);
}

.sell-btn{
background:var(--orange);
}

.profile-btn{
position:absolute;
right:0;
top:0;
width:42px;
height:42px;
border-radius:12px;
background:#000;
font-size:18px;
}

.my-row{
display:flex;
justify-content:center;
margin-top:12px;
}

.my-btn{
background:var(--blue);
height:48px;
padding:0 28px;
border-radius:16px;
font-size:16px;
animation:pulse 3s infinite;
}

.container{
padding:14px;
max-width:900px;
margin:auto;
}

.hidden{
display:none !important;
}

form{
display:flex;
flex-direction:column;
gap:12px;
background:var(--card);
padding:16px;
border-radius:22px;
animation:fade .25s ease;
}

input,
select,
textarea{
width:100%;
border:none;
background:var(--card2);
color:#fff;
padding:15px;
font-size:16px;
border-radius:14px;
outline:none;
}

textarea{
resize:none;
height:90px;
}

.submit-btn{
border:none;
background:#00aaff;
color:#fff;
height:54px;
border-radius:16px;
font-size:17px;
font-weight:700;
margin-top:4px;
}

.tools{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:12px;
}

.gray-btn{
background:var(--gray);
color:#fff;
border:none;
height:34px;
padding:0 12px;
border-radius:12px;
font-size:12px;
font-weight:700;
}

.filters{
display:none;
grid-template-columns:1fr;
gap:10px;
background:var(--card);
padding:14px;
border-radius:18px;
margin-bottom:14px;
animation:fade .25s ease;
}

.cards{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

@media(min-width:700px){
.cards{
grid-template-columns:repeat(2,1fr);
}
}

.cards.compact{
grid-template-columns:repeat(2,1fr);
}

.cards.compact .card img,
.cards.compact .no-image{
display:none;
}

.cards.list{
display:flex;
flex-direction:column;
}

.cards.list .card{
display:flex;
align-items:center;
}

.cards.list .card img,
.cards.list .no-image{
display:none;
}

.cards.list .card-content{
flex-direction:row;
justify-content:space-between;
align-items:center;
width:100%;
}

.card{
background:var(--card);
border-radius:22px;
overflow:hidden;
cursor:pointer;
transition:.2s;
animation:fade .25s ease;
}

.card:active{
transform:scale(.98);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
background:#222;
}

.no-image{
width:100%;
height:180px;
display:flex;
align-items:center;
justify-content:center;
background:#2a2a2a;
color:#777;
}

.card-content{
padding:14px;
display:flex;
flex-direction:column;
gap:8px;
}

.card-title{
font-size:20px;
font-weight:700;
word-break:break-word;
}

.price{
font-size:24px;
font-weight:700;
color:var(--green);
}

.empty{
text-align:center;
margin-top:60px;
opacity:.8;
font-size:22px;
}

.modal,
.profile-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.82);
display:none;
justify-content:center;
align-items:flex-end;
z-index:999;
padding:0;
}

.modal-content,
.profile-box{
width:100%;
max-width:700px;
background:var(--card);
border-radius:24px 24px 0 0;
padding:18px;
animation:fade .2s ease;
max-height:90vh;
overflow:auto;
}

.modal-content img{
width:100%;
max-height:320px;
object-fit:cover;
border-radius:18px;
}

.modal-body{
display:flex;
flex-direction:column;
gap:12px;
margin-top:14px;
}

.close-btn,
.remove-btn{
height:52px;
border:none;
border-radius:16px;
color:#fff;
font-size:16px;
font-weight:700;
margin-top:8px;
}

.close-btn{
background:#444;
}

.remove-btn{
background:#ff3b3b;
}

.profile-title{
font-size:26px;
font-weight:700;
margin-bottom:14px;
}

.profile-info{
display:flex;
flex-direction:column;
gap:10px;
font-size:17px;
}

.create-empty-btn{
margin-top:20px;
background:var(--orange);
color:#fff;
border:none;
height:52px;
padding:0 20px;
border-radius:16px;
font-size:16px;
font-weight:700;
}

</style>
</head>
<body>

<header>

<div class="top-row">

<button class="top-btn buy-btn" onclick="showSection('buy')">
Купить
</button>

<button class="top-btn sell-btn" onclick="showSection('sell')">
Продать
</button>

<button class="top-btn profile-btn" onclick="openProfile()">
👤
</button>

</div>

<div class="my-row">
<button class="top-btn my-btn" onclick="showSection('my')">
Мои объявления
</button>
</div>

</header>

<div class="container">

<section id="sellSection" class="hidden">

<form id="sellForm">

<input type="text" id="title" placeholder="Название" required>

<input type="file" id="image" accept="image/*">

<select id="generation" required>
<option value="">Поколение</option>
</select>

<select id="rarity" required>
<option value="">Редкость</option>
<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>
</select>

<select id="biome" required>
<option value="">Биом</option>
<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
<option>Эхо</option>
</select>

<textarea id="features" maxlength="150" placeholder="Описание до 150 символов"></textarea>

<input type="number" id="price" step="0.01" min="0.01" placeholder="Цена TON" required>

<button class="submit-btn" type="submit">
Создать объявление
</button>

</form>

</section>

<section id="buySection">

<div class="tools">

<button class="gray-btn" onclick="toggleFilters()">
Фильтры
</button>

<button class="gray-btn" id="sortBtn">
Цена ↓
</button>

<button class="gray-btn" onclick="changeViewMode()">
Вид
</button>

</div>

<div class="filters" id="filters">

<select id="filterGeneration">
<option value="">Все поколения</option>
</select>

<select id="filterRarity">
<option value="">Любая редкость</option>
<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>
</select>

<select id="filterBiome">
<option value="">Любой биом</option>
<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
<option>Эхо</option>
</select>

</div>

<div class="cards" id="cards"></div>

<div class="empty hidden" id="emptyText">
Пока нет объявлений
</div>

</section>

<section id="mySection" class="hidden">

<div class="cards" id="myCards"></div>

<div class="empty hidden" id="myEmpty">
У вас пока нет объявлений
<br>
<button class="create-empty-btn" onclick="showSection('sell')">
Создать объявление
</button>
</div>

</section>

</div>

<div class="profile-modal" id="profileModal">
<div class="profile-box">
<div class="profile-title">Профиль</div>
<div class="profile-info">
<div id="profileName"></div>
<div id="profileUsername"></div>
</div>
<button class="close-btn" onclick="closeProfile()">
Закрыть
</button>
</div>
</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user || {};

const username = user.username || 'unknown';
const firstName = user.first_name || 'Пользователь';

localStorage.setItem('telegramUsername', username);
localStorage.setItem('telegramName', firstName);

const profileName = document.getElementById('profileName');
const profileUsername = document.getElementById('profileUsername');

profileName.textContent = 'Имя: ' + firstName;
profileUsername.textContent = '@' + username;

const generationIds = ['generation','filterGeneration'];

generationIds.forEach(id=>{
const select = document.getElementById(id);
for(let i=1;i<=10;i++){
const option = document.createElement('option');
option.value = i;
option.textContent = 'Поколение ' + i;
select.appendChild(option);
}
});

let ads = JSON.parse(localStorage.getItem('ads')) || [];
let ascending = true;
let currentView = 0;

function saveAds(){
localStorage.setItem('ads', JSON.stringify(ads));
}

function showSection(type){

['sellSection','buySection','mySection'].forEach(id=>{
document.getElementById(id).classList.add('hidden');
});

if(type === 'sell'){
document.getElementById('sellSection').classList.remove('hidden');
}

if(type === 'buy'){
document.getElementById('buySection').classList.remove('hidden');
renderAds();
}

if(type === 'my'){
document.getElementById('mySection').classList.remove('hidden');
renderMyAds();
}

window.scrollTo({top:0,behavior:'smooth'});
}

function toggleFilters(){
const filters = document.getElementById('filters');
filters.style.display = filters.style.display === 'grid' ? 'none' : 'grid';
}

function changeViewMode(){

const cards = document.getElementById('cards');

currentView++;

if(currentView > 2){
currentView = 0;
}

cards.classList.remove('compact');
cards.classList.remove('list');

if(currentView === 1){
cards.classList.add('compact');
}

if(currentView === 2){
cards.classList.add('list');
}

}

function openProfile(){
document.getElementById('profileModal').style.display = 'flex';
}

function closeProfile(){
document.getElementById('profileModal').style.display = 'none';
}

function getImageHTML(ad){
if(ad.image){
return `<img src="${ad.image}">`;
}
return `<div class="no-image">Нет фото</div>`;
}

function openAd(ad, isMy = false){

const modal = document.createElement('div');
modal.className = 'modal';
modal.style.display = 'flex';

modal.innerHTML = `
<div class="modal-content">

${getImageHTML(ad)}

<div class="modal-body">

<div class="card-title">${ad.title}</div>

<div><b>Поколение:</b> ${ad.generation}</div>
<div><b>Редкость:</b> ${ad.rarity}</div>
<div><b>Биом:</b> ${ad.biome}</div>
<div><b>Описание:</b> ${ad.features || 'Нет описания'}</div>
<div><b>Продавец:</b> @${ad.owner}</div>

<div class="price">${ad.price.toFixed(2)} TON</div>

${isMy ? `
<button class="remove-btn" onclick="removeAd(${ad.id}); this.closest('.modal').remove()">
Снять с продажи
</button>
` : ''}

<button class="close-btn" onclick="this.closest('.modal').remove()">
Закрыть
</button>

</div>
</div>
`;

document.body.appendChild(modal);

modal.addEventListener('click',e=>{
if(e.target === modal){
modal.remove();
}
});

}

function removeAd(id){
ads = ads.filter(ad=>ad.id !== id);
saveAds();
renderAds();
renderMyAds();
}

function renderAds(){

const cards = document.getElementById('cards');
cards.innerHTML = '';

let filtered = [...ads];

const generation = document.getElementById('filterGeneration').value;
const rarity = document.getElementById('filterRarity').value;
const biome = document.getElementById('filterBiome').value;

if(generation){
filtered = filtered.filter(ad => ad.generation == generation);
}

if(rarity){
filtered = filtered.filter(ad => ad.rarity === rarity);
}

if(biome){
filtered = filtered.filter(ad => ad.biome === biome);
}

filtered.sort((a,b)=> ascending ? a.price - b.price : b.price - a.price);

const empty = document.getElementById('emptyText');
empty.classList.toggle('hidden', filtered.length !== 0);

filtered.forEach(ad=>{

const card = document.createElement('div');
card.className = 'card';

card.innerHTML = `
${getImageHTML(ad)}
<div class="card-content">
<div class="card-title">${ad.title}</div>
<div>${ad.rarity}</div>
<div>${ad.biome}</div>
<div class="price">${ad.price.toFixed(2)} TON</div>
</div>
`;

card.onclick = ()=> openAd(ad);

cards.appendChild(card);

});

}

function renderMyAds(){

const myCards = document.getElementById('myCards');
myCards.innerHTML = '';

const myAds = ads.filter(ad => ad.owner === username);

const empty = document.getElementById('myEmpty');
empty.classList.toggle('hidden', myAds.length !== 0);

myAds.forEach(ad=>{

const card = document.createElement('div');
card.className = 'card';

card.innerHTML = `
${getImageHTML(ad)}
<div class="card-content">
<div class="card-title">${ad.title}</div>
<div class="price">${ad.price.toFixed(2)} TON</div>
</div>
`;

card.onclick = ()=> openAd(ad, true);

myCards.appendChild(card);

});

}

['filterGeneration','filterRarity','filterBiome'].forEach(id=>{
document.getElementById(id).addEventListener('change', renderAds);
});

const sortBtn = document.getElementById('sortBtn');

sortBtn.addEventListener('click',()=>{
ascending = !ascending;
sortBtn.textContent = ascending ? 'Цена ↓' : 'Цена ↑';
renderAds();
});

const sellForm = document.getElementById('sellForm');

sellForm.addEventListener('submit',e=>{

e.preventDefault();

const file = document.getElementById('image').files[0];

const createAd = (imageData = null)=>{

const ad = {
id: Date.now(),
owner: username,
title: document.getElementById('title').value,
image: imageData,
generation: document.getElementById('generation').value,
rarity: document.getElementById('rarity').value,
biome: document.getElementById('biome').value,
features: document.getElementById('features').value,
price: parseFloat(document.getElementById('price').value)
};

ads.unshift(ad);

saveAds();
renderAds();
renderMyAds();

sellForm.reset();

showSection('buy');

};

if(file){
const reader = new FileReader();
reader.onload = ()=> createAd(reader.result);
reader.readAsDataURL(file);
}else{
createAd();
}

});

showSection('buy');

</script>
</body>
</html>
