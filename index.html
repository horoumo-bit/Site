<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gatto | Shop</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
min-height:100vh;
}

header{
padding:18px 16px;
display:flex;
flex-direction:column;
gap:16px;
background:#1b1b1b;
position:sticky;
top:0;
z-index:100;
}

.top-row{
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:14px;
position:relative;
padding-right:60px;
}

.center-row{
display:flex;
justify-content:center;
width:100%;
}

.top-btn{
border:none;
min-height:54px;
min-width:130px;
padding:0 20px;
border-radius:18px;
cursor:pointer;
font-size:17px;
font-weight:700;
transition:.2s;
color:white;
}

.top-btn:hover{
transform:scale(1.05);
}

.buy-btn{
background:#4caf50;
}

.sell-btn{
background:#ff9800;
}

.my-btn{
background:#2196f3;
}

.profile-btn{
background:#000;
}

.gray-btn{
background:#444;
border-radius:12px;
padding:6px 10px;
min-height:28px;
min-width:auto;
font-size:12px;
font-weight:700;
}

.centered-my{
min-width:260px;
}

.small-profile{
position:absolute;
right:-2px;
top:-10px;
width:40px;
height:40px;
border-radius:11px;
padding:0;
font-size:16px;
display:flex;
justify-content:center;
align-items:center;
min-width:40px;
min-height:40px;
background:#000;
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}

.hidden{
display:none;
}

form{
background:#1f1f1f;
padding:20px;
border-radius:20px;
display:flex;
flex-direction:column;
gap:15px;
}

input,
select,
textarea{
padding:14px;
border:none;
border-radius:14px;
outline:none;
font-size:16px;
}

textarea{
resize:none;
height:90px;
}

.submit-btn{
border:none;
background:#00aaff;
color:white;
padding:15px;
border-radius:16px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.filters{
background:#1f1f1f;
padding:20px;
border-radius:20px;
display:none;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:8px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#1f1f1f;
border-radius:22px;
overflow:hidden;
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.no-image{
width:100%;
height:220px;
background:#2a2a2a;
display:flex;
justify-content:center;
align-items:center;
color:#777;
}

.card-content{
padding:16px;
display:flex;
flex-direction:column;
gap:8px;
}

.card-title{
font-size:22px;
font-weight:bold;
}

.price{
color:#4caf50;
font-size:24px;
font-weight:bold;
}

.empty{
margin-top:70px;
text-align:center;
font-size:24px;
opacity:.85;
}

</style>
</head>
<body>

<header>

<div class="top-row">

<button class="top-btn buy-btn" onclick="showSection('buy')">
Купить
</button>

<button class="top-btn sell-btn" onclick="showSection('sell')">
Продать
</button>

<button
class="top-btn profile-btn small-profile"
>
👤
</button>

</div>

<div class="center-row">

<button
class="top-btn my-btn centered-my"
onclick="showSection('my')"
>
Мои объявления
</button>

</div>

</header>

<div class="container">

<section id="sellSection">

<form id="sellForm">

<input
type="text"
id="title"
placeholder="Название объявления"
required
>

<input
type="file"
id="image"
accept="image/*"
>

<select id="generation" required>
<option value="">Поколение</option>
</select>

<select id="rarity" required>
<option value="">Редкость</option>
<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>
</select>

<select id="biome" required>
<option value="">Биом</option>
<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
</select>

<textarea
id="features"
maxlength="150"
placeholder="Описание"
></textarea>

<input
type="number"
id="price"
placeholder="Цена TON"
step="0.01"
min="0.01"
required
>

<button class="submit-btn" type="submit">
Создать объявление
</button>

</form>

</section>

<section id="buySection" class="hidden">

<div style="
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:15px;
">

<button
class="top-btn gray-btn"
onclick="toggleFilters()"
>
Фильтры
</button>

<button
class="top-btn gray-btn"
id="sortBtn"
>
Цена ↓
</button>

<button
class="top-btn gray-btn"
onclick="changeViewMode()"
>
Вид
</button>

</div>

<div class="filters" id="filters">

<select id="filterGeneration">
<option value="">Все поколения</option>
</select>

<select id="filterRarity">
<option value="">Любая редкость</option>
<option>Обычный</option>
<option>Редкий</option>
<option>Мифический</option>
<option>Легендарный</option>
<option>Мутант</option>
</select>

<select id="filterBiome">
<option value="">Любой биом</option>
<option>Луг</option>
<option>Лес</option>
<option>Пустыня</option>
<option>Горы</option>
<option>Море</option>
<option>Грядки</option>
<option>Лёд</option>
</select>

</div>

<div class="cards" id="cards"></div>

<div class="empty" id="emptyText">
Пока нет объявлений
</div>

</section>

<section id="mySection" class="hidden">

<div class="cards" id="myCards"></div>

<div class="empty" id="myEmpty">

<div style="
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
">

<div>
У вас пока нет объявлений
</div>

<button
class="top-btn sell-btn"
onclick="showSection('sell')"
>
Создать объявление
</button>

</div>

</div>

</section>

</div>

<script>

let tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

localStorage.setItem(
"telegramUsername",
user.username || "unknown"
);

}

const generationSelects = [
document.getElementById("generation"),
document.getElementById("filterGeneration")
];

generationSelects.forEach(select=>{

for(let i=1;i<=10;i++){

const option =
document.createElement("option");

option.value=i;

option.textContent=
"Поколение "+i;

select.appendChild(option);

}

});

let ads =
JSON.parse(localStorage.getItem("ads"))
|| [];

let ascending = true;

function saveAds(){

localStorage.setItem(
"ads",
JSON.stringify(ads)
);

}

function showSection(type){

document.getElementById("sellSection")
.classList.add("hidden");

document.getElementById("buySection")
.classList.add("hidden");

document.getElementById("mySection")
.classList.add("hidden");

if(type==="sell"){

document.getElementById("sellSection")
.classList.remove("hidden");

}

if(type==="buy"){

document.getElementById("buySection")
.classList.remove("hidden");

renderAds();

}

if(type==="my"){

document.getElementById("mySection")
.classList.remove("hidden");

renderMyAds();

}

}

function toggleFilters(){

const filters =
document.getElementById("filters");

filters.style.display =
filters.style.display==="grid"
? "none"
: "grid";

}

function changeViewMode(){}

function getImageHTML(ad){

if(ad.image){

return `<img src="${ad.image}">`;

}else{

return `
<div class="no-image">
Нет фото
</div>
`;

}

}

document.getElementById("sellForm")
.addEventListener("submit",e=>{

e.preventDefault();

const file =
document.getElementById("image")
.files[0];

const createAd = (
imageData = null
)=>{

const ad = {

id:Date.now(),

title:
document.getElementById("title")
.value,

image:imageData,

generation:
document.getElementById(
"generation"
).value,

rarity:
document.getElementById(
"rarity"
).value,

biome:
document.getElementById(
"biome"
).value,

features:
document.getElementById(
"features"
).value,

price:parseFloat(
document.getElementById(
"price"
).value
)

};

ads.push(ad);

saveAds();

alert("Объявление создано!");

document.getElementById(
"sellForm"
).reset();

};

if(file){

const reader =
new FileReader();

reader.onload = ()=>{

createAd(reader.result);

};

reader.readAsDataURL(file);

}else{

createAd(null);

}

});

document.getElementById("sortBtn")
.addEventListener("click",()=>{

ascending=!ascending;

document.getElementById("sortBtn")
.textContent =
ascending
? "Цена ↓"
: "Цена ↑";

renderAds();

});

function renderAds(){

const cards =
document.getElementById("cards");

cards.innerHTML="";

let filtered=[...ads];

filtered.sort((a,b)=>

ascending
? a.price-b.price
: b.price-a.price

);

document.getElementById(
"emptyText"
).style.display =
filtered.length
? "none"
: "block";

filtered.forEach(ad=>{

const card =
document.createElement("div");

card.className="card";

card.innerHTML=`

${getImageHTML(ad)}

<div class="card-content">

<div class="card-title">
${ad.title}
</div>

<div>
${ad.rarity}
</div>

<div>
${ad.biome}
</div>

<div class="price">
${ad.price.toFixed(2)} TON
</div>

</div>

`;

cards.appendChild(card);

});

}

function renderMyAds(){

const myCards =
document.getElementById("myCards");

myCards.innerHTML="";

const myAds = ads;

document.getElementById(
"myEmpty"
).style.display =
myAds.length
? "none"
: "block";

myAds.forEach(ad=>{

const card =
document.createElement("div");

card.className="card";

card.innerHTML=`

${getImageHTML(ad)}

<div class="card-content">

<div class="card-title">
${ad.title}
</div>

<div class="price">
${ad.price.toFixed(2)} TON
</div>

</div>

`;

myCards.appendChild(card);

});

}

showSection("buy");

</script>
</body>
</html>
