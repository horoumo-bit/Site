let listings = [];

/* Загрузка базы */

async function loadListings() {

  const { data, error } = await db
    .from('listings')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.log(error);
    listings = [];
    return;
  }

  listings = (data || []).map(item => ({
    ...item,
    ownerName: item.owner_name,
    createdAt: item.created_at
  }));

  renderListings();
}

/* Сохранение базы */

async function saveListingToSupabase(listing) {

  const { error } = await db
    .from('listings')
    .insert([{
      id: listing.id,
      owner: listing.owner,
      owner_name: listing.ownerName,
      title: listing.title,
      username: listing.username,
      generation: listing.generation,
      rarity: listing.rarity,
      biome: listing.biome,
      description: listing.description,
      price: listing.price,
      image: listing.image,
    }]);

  if (error) {
    console.log(error);
    alert('Ошибка сохранения');
    return;
  }

  loadListings();

  closeSellModal();

  clearForm();
}

    function openSellModal() {

      document
        .getElementById('sellModal')
        .classList.remove('hidden');

      document
        .getElementById('sellModal')
        .classList.add('flex');
    }

    function closeSellModal() {

      document
        .getElementById('sellModal')
        .classList.add('hidden');

      document
        .getElementById('sellModal')
        .classList.remove('flex');
    }

    function toggleFilters() {

      filtersOpen = !filtersOpen;

      const block =
        document.getElementById('filtersBlock');

      const arrow =
        document.getElementById('filterArrow');

      if (filtersOpen) {

        block.classList.remove('hidden');

        arrow.innerText = '⬆';

      } else {

        block.classList.add('hidden');

        arrow.innerText = '⬇';
      }
    }

    function changeView() {

      currentView++;

      if (currentView > 3) currentView = 1;

      document.getElementById(
        'viewModeText'
      ).innerText = viewNames[currentView];

      renderListings();
    }

    function createListing() {

      const title =
        document.getElementById('itemTitle').value.trim();

      const username =
        document.getElementById('telegramUsername').value.trim();

      const generation =
        document.getElementById('generationInput').value;

      const rarity =
        document.getElementById('rarityInput').value;

      const biome =
        document.getElementById('biomeInput').value;

      const description =
        document.getElementById('descriptionInput').value.trim();

      const price =
        parseFloat(
          document.getElementById('priceInput').value
        );

      const imageFile =
        document.getElementById('imageInput').files[0];

      if (
        !title ||
        !username ||
        !generation ||
        !rarity ||
        !biome ||
        !description ||
        isNaN(price)
      ) {

        alert('Заполните все обязательные поля');

        return;
      }

      const listing = {

        id: Date.now(),

        owner:
          telegramUser.username || username,

        ownerName:
          telegramUser.first_name || 'Пользователь',

        title,
        username,
        generation,
        rarity,
        biome,
        description,

        price: Number(price.toFixed(2)),

        image: '',

        createdAt: new Date().toISOString()
      };

      if (imageFile) {

        const reader = new FileReader();

        reader.onload = function(e) {

          listing.image = e.target.result;

          saveListingToSupabase(listing);

          closeSellModal();

          clearForm();
        };

        reader.readAsDataURL(imageFile);

} else {

  saveListingToSupabase(listing);
}
    }

    function clearForm() {

      document.getElementById('itemTitle').value = '';

      document.getElementById('telegramUsername').value =
        telegramUser.username
        ? '@' + telegramUser.username
        : '';

      document.getElementById('generationInput').value = '';

      document.getElementById('rarityInput').value = '';

      document.getElementById('biomeInput').value = '';

      document.getElementById('descriptionInput').value = '';

      document.getElementById('priceInput').value = '';

      document.getElementById('imageInput').value = '';
    }

    function toggleSort() {

      sortAscending = !sortAscending;

      document.getElementById('sortButton').innerText =
        sortAscending
        ? 'Цена ↑'
        : 'Цена ↓';

      renderListings();
    }

    function showTab(tab) {

      currentTab = tab;

      renderListings();
    }

async function removeListing(id) {

  if (!confirm('Снять объявление с продажи?'))
    return;

  const { error } = await db
    .from('listings')
    .delete()
    .eq('id', id);

  if (error) {
    console.log(error);
    return;
  }

  loadListings();

  closeDetails();
}

    function closeDetails() {

      detailsModal.classList.add('hidden');

      detailsModal.classList.remove('flex');
    }

    function getFilteredListings() {

      const generation =
        document.getElementById('generationFilter').value;

      const rarity =
        document.getElementById('rarityFilter').value;

      const biome =
        document.getElementById('biomeFilter').value;

      const search =
        document.getElementById('searchInput').value.toLowerCase();

      const minPrice =
        parseFloat(
          document.getElementById('minPriceFilter').value
        );

      const maxPrice =
        parseFloat(
          document.getElementById('maxPriceFilter').value
        );

      let data = [...listings];

      if (currentTab === 'my') {

        data =
          data.filter(
            x => x.owner === telegramUser.username
          );
      }

      data = data.filter(item => {

        return (

          (!generation || item.generation == generation) &&

          (!rarity || item.rarity === rarity) &&

          (!biome || item.biome === biome) &&

          (!search || item.title.toLowerCase().includes(search)) &&

          (isNaN(minPrice) || item.price >= minPrice) &&

          (isNaN(maxPrice) || item.price <= maxPrice)
        );
      });

      data.sort((a, b) => {

        return sortAscending
          ? a.price - b.price
          : b.price - a.price;
      });

      return data;
    }

        marketContainer.innerHTML =

                  ${item.title}
                </div>

                <div class="text-zinc-400 text-sm mt-1">
                  ${item.rarity} • ${item.biome} • Gen ${item.generation}
                </div>

              </div>

              <div class="font-black text-2xl text-emerald-400">
                ${item.price} TON
              </div>

            </div>

          `).join('');
      }
    }

    [
      'searchInput',
      'generationFilter',
      'rarityFilter',
      'biomeFilter',
      'minPriceFilter',
      'maxPriceFilter'
    ].forEach(id => {

      document
        .getElementById(id)
        .addEventListener('input', renderListings);

      document
        .getElementById(id)
        .addEventListener('change', renderListings);
    });

    clearForm();

    loadListings();

  </script>

</body>
</html>
