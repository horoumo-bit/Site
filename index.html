<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TON Market</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-4">

    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full bg-zinc-800 overflow-hidden border border-zinc-700">
          <img id="profilePhoto" class="w-full h-full object-cover hidden" />
          <div id="profilePlaceholder" class="w-full h-full flex items-center justify-center text-xl">👤</div>
        </div>

        <div>
          <div id="profileName" class="font-bold text-lg">Telegram Profile</div>
          <div id="profileUsername" class="text-zinc-400 text-sm">@username</div>
        </div>
      </div>

      <div class="flex flex-wrap gap-2">
        <button onclick="openSellModal()" class="bg-emerald-500 hover:bg-emerald-600 transition px-5 py-3 rounded-2xl font-semibold">
          Продать
        </button>

        <button onclick="showTab('buy')" class="bg-blue-500 hover:bg-blue-600 transition px-5 py-3 rounded-2xl font-semibold">
          Купить
        </button>

        <button onclick="showTab('my')" class="bg-zinc-800 hover:bg-zinc-700 transition px-5 py-3 rounded-2xl font-semibold border border-zinc-700">
          Мои объявления
        </button>
      </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 mb-5">
      <div class="flex items-center justify-between cursor-pointer" onclick="toggleFilters()">
        <div class="flex items-center gap-3">
          <h2 class="text-xl font-bold">Поиск и фильтры</h2>

          <button onclick="event.stopPropagation(); changeView()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm border border-zinc-700">
            Вид: <span id="viewModeText">Обычный</span>
          </button>
        </div>

        <div id="filterArrow" class="text-2xl transition">⬆</div>
      </div>

      <div id="filtersBlock" class="mt-5">
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
          <input id="searchInput" type="text" placeholder="Поиск по названию..." class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none" />

          <select id="generationFilter" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
            <option value="">Поколение</option>
          </select>

          <select id="rarityFilter" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
            <option value="">Редкость</option>
            <option>Обычный</option>
            <option>Редкий</option>
            <option>Мифический</option>
            <option>Легендарный</option>
            <option>Мутант</option>
          </select>

          <select id="biomeFilter" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
            <option value="">Биом</option>
            <option>Луг</option>
            <option>Лес</option>
            <option>Пустыня</option>
            <option>Горы</option>
            <option>Море</option>
            <option>Грядки</option>
            <option>Лёд</option>
          </select>

          <button id="sortButton" onclick="toggleSort()" class="bg-purple-600 hover:bg-purple-700 rounded-xl px-4 py-3 font-semibold">
            Цена: Дешёвые → Дорогие
          </button>
        </div>
      </div>
    </div>

    <div id="marketContainer"></div>
  </div>

  <div id="sellModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4 overflow-y-auto">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-2xl my-10">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">Создать объявление</h2>

        <button onclick="closeSellModal()" class="text-2xl">✕</button>
      </div>

      <div class="grid gap-4">
        <input id="itemTitle" maxlength="50" type="text" placeholder="Название" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none" />

        <input id="telegramUsername" maxlength="40" type="text" placeholder="Username Telegram (@example)" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none" />

        <input id="imageInput" type="file" accept="image/*" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3" />

        <select id="generationInput" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
          <option value="">Выберите поколение</option>
        </select>

        <select id="rarityInput" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
          <option value="">Редкость</option>
          <option>Обычный</option>
          <option>Редкий</option>
          <option>Мифический</option>
          <option>Легендарный</option>
          <option>Мутант</option>
        </select>

        <select id="biomeInput" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3">
          <option value="">Биом</option>
          <option>Луг</option>
          <option>Лес</option>
          <option>Пустыня</option>
          <option>Горы</option>
          <option>Море</option>
          <option>Грядки</option>
          <option>Лёд</option>
        </select>

        <textarea id="descriptionInput" maxlength="150" placeholder="Особенности (до 150 символов)" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 h-28 resize-none outline-none"></textarea>

        <input id="priceInput" step="0.01" min="0" type="number" placeholder="Цена Ton" class="bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 outline-none" />

        <button onclick="createListing()" class="bg-emerald-500 hover:bg-emerald-600 transition py-4 rounded-2xl font-bold text-lg">
          Выставить на продажу
        </button>
      </div>
    </div>
  </div>

  <div id="detailsModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-y-auto">
    <div id="detailsContent" class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-3xl overflow-hidden"></div>
  </div>

  <script>
    const marketContainer = document.getElementById('marketContainer');
    const detailsModal = document.getElementById('detailsModal');
    const detailsContent = document.getElementById('detailsContent');

    let currentTab = 'buy';
    let sortAscending = true;
    let filtersOpen = true;
    let currentView = 1;

    const viewNames = {
      1: 'Обычный',
      2: 'Квадратики',
      3: 'Линия'
    };

    const tg = window.Telegram?.WebApp;

    let telegramUser = {
      first_name: 'Пользователь',
      username: 'telegram',
      photo_url: ''
    };

    if (tg) {
      tg.expand();
      tg.ready();

      if (tg.initDataUnsafe?.user) {
        telegramUser = tg.initDataUnsafe.user;
      }
    }

    document.getElementById('profileName').innerText = telegramUser.first_name || 'Пользователь';
    document.getElementById('profileUsername').innerText = telegramUser.username ? '@' + telegramUser.username : '@telegram';

    if (telegramUser.photo_url) {
      const img = document.getElementById('profilePhoto');
      img.src = telegramUser.photo_url;
      img.classList.remove('hidden');
      document.getElementById('profilePlaceholder').classList.add('hidden');
    }

    const generationSelects = [
      document.getElementById('generationInput'),
      document.getElementById('generationFilter')
    ];

    for (let i = 1; i <= 10; i++) {
      generationSelects.forEach(select => {
        const option = document.createElement('option');
        option.value = i;
        option.innerText = i + ' поколение';
        select.appendChild(option.cloneNode(true));
      });
    }

    let listings = JSON.parse(localStorage.getItem('ton_market_listings') || '[]');

    function saveListings() {
      localStorage.setItem('ton_market_listings', JSON.stringify(listings));
    }

    function openSellModal() {
      document.getElementById('sellModal').classList.remove('hidden');
      document.getElementById('sellModal').classList.add('flex');
    }

    function closeSellModal() {
      document.getElementById('sellModal').classList.add('hidden');
      document.getElementById('sellModal').classList.remove('flex');
    }

    function toggleFilters() {
      filtersOpen = !filtersOpen;

      const block = document.getElementById('filtersBlock');
      const arrow = document.getElementById('filterArrow');

      if (filtersOpen) {
        block.classList.remove('hidden');
        arrow.innerText = '⬆';
      } else {
        block.classList.add('hidden');
        arrow.innerText = '⬇';
      }
    }

    function changeView() {
      currentView++;

      if (currentView > 3) currentView = 1;

      document.getElementById('viewModeText').innerText = viewNames[currentView];
      renderListings();
    }

    function createListing() {
      const title = document.getElementById('itemTitle').value.trim();
      const username = document.getElementById('telegramUsername').value.trim();
      const generation = document.getElementById('generationInput').value;
      const rarity = document.getElementById('rarityInput').value;
      const biome = document.getElementById('biomeInput').value;
      const description = document.getElementById('descriptionInput').value.trim();
      const price = parseFloat(document.getElementById('priceInput').value);
      const imageFile = document.getElementById('imageInput').files[0];

      if (!title || !username || !generation || !rarity || !biome || !description || isNaN(price)) {
        alert('Заполните все обязательные поля');
        return;
      }

      const listing = {
        id: Date.now(),
        owner: telegramUser.username || username,
        ownerName: telegramUser.first_name || 'Пользователь',
        title,
        username,
        generation,
        rarity,
        biome,
        description,
        price: Number(price.toFixed(2)),
        image: '',
        createdAt: new Date().toISOString()
      };

      if (imageFile) {
        const reader = new FileReader();

        reader.onload = function(e) {
          listing.image = e.target.result;
          listings.unshift(listing);
          saveListings();
          renderListings();
          closeSellModal();
          clearForm();
        };

        reader.readAsDataURL(imageFile);
      } else {
        listings.unshift(listing);
        saveListings();
        renderListings();
        closeSellModal();
        clearForm();
      }
    }

    function clearForm() {
      document.getElementById('itemTitle').value = '';
      document.getElementById('telegramUsername').value = telegramUser.username ? '@' + telegramUser.username : '';
      document.getElementById('generationInput').value = '';
      document.getElementById('rarityInput').value = '';
      document.getElementById('biomeInput').value = '';
      document.getElementById('descriptionInput').value = '';
      document.getElementById('priceInput').value = '';
      document.getElementById('imageInput').value = '';
    }

    function toggleSort() {
      sortAscending = !sortAscending;

      document.getElementById('sortButton').innerText = sortAscending
        ? 'Цена: Дешёвые → Дорогие'
        : 'Цена: Дорогие → Дешёвые';

      renderListings();
    }

    function showTab(tab) {
      currentTab = tab;
      renderListings();
    }

    function removeListing(id) {
      if (!confirm('Снять объявление с продажи?')) return;

      listings = listings.filter(item => item.id !== id);
      saveListings();
      renderListings();
      closeDetails();
    }

    function openDetails(id) {
      const item = listings.find(x => x.id === id);
      if (!item) return;

      detailsModal.classList.remove('hidden');
      detailsModal.classList.add('flex');

      detailsContent.innerHTML = `
        <div class="relative">
          ${item.image
            ? `<img src="${item.image}" class="w-full h-80 object-cover" />`
            : `<div class="w-full h-80 bg-zinc-800 flex items-center justify-center text-7xl">📦</div>`}

          <button onclick="closeDetails()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/70 w-12 h-12 rounded-full text-2xl">
            ✕
          </button>
        </div>

        <div class="p-6 space-y-4">
          <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
              <h2 class="text-3xl font-bold">${item.title}</h2>
              <div class="text-zinc-400 mt-1">Продавец: ${item.ownerName}</div>
            </div>

            <div class="bg-emerald-500 text-black px-5 py-3 rounded-2xl font-black text-2xl">
              ${item.price} TON
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-3">
            <div class="bg-zinc-800 rounded-2xl p-4">
              <div class="text-zinc-400 text-sm">Поколение</div>
              <div class="font-bold text-lg">${item.generation}</div>
            </div>

            <div class="bg-zinc-800 rounded-2xl p-4">
              <div class="text-zinc-400 text-sm">Редкость</div>
              <div class="font-bold text-lg">${item.rarity}</div>
            </div>

            <div class="bg-zinc-800 rounded-2xl p-4">
              <div class="text-zinc-400 text-sm">Биом</div>
              <div class="font-bold text-lg">${item.biome}</div>
            </div>

            <div class="bg-zinc-800 rounded-2xl p-4">
              <div class="text-zinc-400 text-sm">Telegram</div>
              <div class="font-bold text-lg">${item.username}</div>
            </div>
          </div>

          <div class="bg-zinc-800 rounded-2xl p-5">
            <div class="text-zinc-400 text-sm mb-2">Описание</div>
            <div>${item.description}</div>
          </div>

          <div class="flex flex-wrap gap-3 pt-2">
            <a href="https://t.me/${item.username.replace('@', '')}" target="_blank" class="bg-blue-500 hover:bg-blue-600 transition px-5 py-3 rounded-2xl font-bold">
              Написать в Telegram
            </a>

            ${item.owner === telegramUser.username
              ? `<button onclick="removeListing(${item.id})" class="bg-red-500 hover:bg-red-600 transition px-5 py-3 rounded-2xl font-bold">
                  Снять с продажи
                </button>`
              : ''}
          </div>
        </div>
      `;
    }

    function closeDetails() {
      detailsModal.classList.add('hidden');
      detailsModal.classList.remove('flex');
    }

    function getFilteredListings() {
      const generation = document.getElementById('generationFilter').value;
      const rarity = document.getElementById('rarityFilter').value;
      const biome = document.getElementById('biomeFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();

      let data = [...listings];

      if (currentTab === 'my') {
        data = data.filter(x => x.owner === telegramUser.username);
      }

      data = data.filter(item => {
        return (
          (!generation || item.generation == generation) &&
          (!rarity || item.rarity === rarity) &&
          (!biome || item.biome === biome) &&
          (!search || item.title.toLowerCase().includes(search))
        );
      });

      data.sort((a, b) => {
        return sortAscending
          ? a.price - b.price
          : b.price - a.price;
      });

      return data;
    }

    function renderListings() {
      const data = getFilteredListings();

      if (data.length === 0) {
        marketContainer.innerHTML = `
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-12 text-center text-zinc-400 text-xl">
            Объявления не найдены
          </div>
        `;

        return;
      }

      if (currentView === 1) {
        marketContainer.className = 'grid md:grid-cols-2 xl:grid-cols-3 gap-5';

        marketContainer.innerHTML = data.map(item => `
          <div onclick="openDetails(${item.id})" class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden cursor-pointer hover:scale-[1.02] transition duration-200">
            ${item.image
              ? `<img src="${item.image}" class="w-full h-56 object-cover" />`
              : `<div class="w-full h-56 bg-zinc-800 flex items-center justify-center text-6xl">📦</div>`}

            <div class="p-5 space-y-3">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <h3 class="font-bold text-xl">${item.title}</h3>
                  <div class="text-zinc-400 text-sm">${item.username}</div>
                </div>

                <div class="bg-emerald-500 text-black px-3 py-2 rounded-xl font-bold whitespace-nowrap">
                  ${item.price} TON
                </div>
              </div>

              <div class="flex flex-wrap gap-2 text-sm">
                <div class="bg-zinc-800 px-3 py-1 rounded-full">${item.rarity}</div>
                <div class="bg-zinc-800 px-3 py-1 rounded-full">${item.biome}</div>
                <div class="bg-zinc-800 px-3 py-1 rounded-full">Gen ${item.generation}</div>
              </div>
            </div>
          </div>
        `).join('');
      }

      if (currentView === 2) {
        marketContainer.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4';

        marketContainer.innerHTML = data.map(item => `
          <div onclick="openDetails(${item.id})" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 cursor-pointer hover:bg-zinc-800 transition text-center">
            <div class="text-5xl mb-3">${item.image ? '🖼️' : '📦'}</div>
            <div class="font-bold truncate">${item.title}</div>
            <div class="text-zinc-400 text-sm mt-1">${item.price} TON</div>
          </div>
        `).join('');
      }

      if (currentView === 3) {
        marketContainer.className = 'flex flex-col gap-3';

        marketContainer.innerHTML = data.map(item => `
          <div onclick="openDetails(${item.id})" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 cursor-pointer hover:bg-zinc-800 transition flex flex-wrap items-center justify-between gap-4">
            <div>
              <div class="font-bold text-xl">${item.title}</div>
              <div class="text-zinc-400 text-sm mt-1">
                ${item.rarity} • ${item.biome} • Gen ${item.generation}
              </div>
            </div>

            <div class="font-black text-2xl text-emerald-400">
              ${item.price} TON
            </div>
          </div>
        `).join('');
      }
    }

    ['searchInput', 'generationFilter', 'rarityFilter', 'biomeFilter'].forEach(id => {
      document.getElementById(id).addEventListener('input', renderListings);
      document.getElementById(id).addEventListener('change', renderListings);
    });

    clearForm();
    renderListings();
  </script>
</body>
</html>
